<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notre App</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; background-color: #f2f2f7; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 80%; }
        h1 { color: #1c1c1e; font-size: 24px; }
        button { background-color: #007aff; color: white; border: none; padding: 15px 25px; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 20px; width: 100%; }
        button:active { background-color: #0056b3; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 C'est en ligne !</h1>
        <p>L'application de notre groupe fonctionne.</p>
        <button onclick="alert('Bravo ! Ton app est officiellement sur ton iPhone !')">Tester le bouton</button>
    </div>
</body>
</html>
