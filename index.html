<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JJB NOTES</title>
<style>
:root{
  --bg0:#111110;--bg1:#1a1917;--bg2:#222120;--bg3:#2c2b29;
  --t1:#e8e0d0;--t2:#a09880;--t3:#504840;
  --acc:#c8a96e;--aon:#6dbb8a;--aal:#c47a5a;--afu:#7aaec8;
  --b1:#302e2c;--b2:#252320;
  --r:14px;--th:58px;--hh:72px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
input,textarea{-webkit-user-select:text!important;user-select:text!important;-webkit-touch-callout:default!important;}
html,body{height:100%;width:100%;overflow:hidden;position:fixed;
  background:#111110;color:#e8e0d0;
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Segoe UI',sans-serif;
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.screen{position:fixed;inset:0;display:none;flex-direction:column;
  background:#111110;padding-top:var(--th);
  padding-bottom:calc(var(--hh) + env(safe-area-inset-bottom,0px));
  overflow:hidden;z-index:1;}
.screen.active{display:flex;animation:sIn .18s ease;}
@keyframes sIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#sh-home{padding:0;}

/* TOPBAR */
#gt{position:fixed;top:0;left:0;right:0;height:var(–th);display:none;
align-items:center;gap:8px;padding:0 16px;
background:#1a1917;border-bottom:1px solid #302e2c;z-index:500;}
#gt.on{display:flex;}
#tt{flex:1;font-size:17px;font-weight:600;color:#e8e0d0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* HOMEBAR */
#gh{position:fixed;bottom:0;left:0;right:0;display:none;
align-items:center;justify-content:center;
background:#1a1917;border-top:1px solid #302e2c;
padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));
z-index:500;}
#gh.on{display:flex;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;
border:1px solid #302e2c;padding:11px 20px;border-radius:10px;
background:#222120;color:#e8e0d0;transition:background .12s,transform .08s;white-space:nowrap;}
.btn:active{transform:scale(.95);background:#2c2b29;}
.bbk{width:42px;height:42px;padding:0;font-size:26px;font-weight:300;
border-radius:10px;background:none;border:none;color:#c8a96e;line-height:1;}
.bbk:active{background:#222120;transform:scale(.92);}
.bic{width:42px;height:42px;padding:0;font-size:22px;border-radius:10px;
background:none;border:none;color:#a09880;}
.bic:active{background:#222120;transform:scale(.92);}
.bhm{font-size:16px;font-weight:700;padding:13px 52px;border-radius:12px;
background:#222120;border-color:#c8a96e;color:#c8a96e;}
.bacc{background:#211c12;border-color:#c8a96e;color:#c8a96e;}
.bgr{background:#0e1f14;border-color:#6dbb8a;color:#6dbb8a;}
.brd{background:#200c0c;border-color:#c47a5a;color:#c47a5a;}
.bsm{font-size:14px;padding:9px 16px;}

/* SCROLL */
.scr{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px 20px;-webkit-overflow-scrolling:touch;}
.scr::-webkit-scrollbar{width:3px;}
.scr::-webkit-scrollbar-thumb{background:#302e2c;border-radius:2px;}

/* HOME */
.hm-hdr{flex-shrink:0;text-align:center;padding:44px 24px 28px;
border-bottom:1px solid #302e2c;
background:linear-gradient(180deg,#222120 0%,#111110 100%);}
.hm-logo{font-size:26px;font-weight:800;letter-spacing:5px;color:#c8a96e;}
.hm-sub{font-size:13px;color:#504840;margin-top:7px;letter-spacing:1.5px;text-transform:uppercase;}
.hm-panels{flex:1;display:flex;flex-direction:column;gap:14px;padding:18px 14px;overflow:hidden;}
.hm-panel{flex:1;cursor:pointer;border-radius:var(–r);background:#222120;
border:1px solid #302e2c;display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:10px;padding:20px;position:relative;overflow:hidden;
transition:background .12s,transform .1s;box-shadow:0 2px 12px rgba(0,0,0,.45);}
.hm-panel:active{transform:scale(.975);background:#2c2b29;}
.hm-panel::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 var(–r) var(–r);}
.hp-c::after{background:#c8a96e;}
.hp-b::after{background:#6dbb8a;}
.hp-icon{font-size:38px;line-height:1;}
.hp-lbl{font-size:18px;font-weight:800;letter-spacing:3px;}
.hp-desc{font-size:13px;color:#a09880;text-align:center;}
.hp-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.hp-tag{font-size:11px;font-weight:600;padding:4px 12px;border:1px solid;border-radius:20px;}
.hm-bot{flex-shrink:0;padding:14px;border-top:1px solid #302e2c;background:#1a1917;display:flex;justify-content:center;}

/* BIBLIO ROOT CARDS */
.rc-wrap{display:flex;flex-direction:column;gap:14px;margin-bottom:14px;}
.rc{border-radius:var(–r);background:#222120;border:1px solid #302e2c;
display:flex;align-items:center;padding:20px 18px;cursor:pointer;
transition:background .12s,transform .1s;min-height:88px;position:relative;overflow:hidden;}
.rc:active{background:#2c2b29;transform:scale(.98);}
.rc::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(–r) 0 0 var(–r);}
.rc-g::before{background:#c8a96e;}
.rc-w::before{background:#c47a5a;}
.rc-txt{flex:1;padding-left:12px;}
.rc-lbl{font-size:18px;font-weight:800;letter-spacing:2px;}
.rc-sub{font-size:13px;color:#a09880;margin-top:4px;}
.rc-arr{font-size:22px;color:#504840;}

/* NODE CARDS */
.ncw{position:relative;margin-bottom:10px;border-radius:var(–r);overflow:hidden;}
.nc{display:flex;align-items:stretch;background:#222120;border:1px solid #302e2c;
border-radius:var(–r);cursor:pointer;touch-action:pan-y;min-height:78px;
transition:background .1s;position:relative;}
.nc:active{background:#2c2b29;}
.ncw.lp-active .nc{border-color:#c8a96e;background:#2c2b29;}
.ncw.drag-src .nc{opacity:.35;}
.ncw.drag-over{border-top:3px solid #c8a96e;}
.nstrip{width:4px;align-self:stretch;flex-shrink:0;border-radius:var(–r) 0 0 var(–r);}
.s-on{background:#6dbb8a;}.s-al{background:#c47a5a;}.s-fu{background:#7aaec8;}.s-no{background:#252320;}
.nbody{flex:1;padding:16px;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:6px;}
.ntitle{font-size:16px;font-weight:600;color:#e8e0d0;line-height:1.4;}
.nmeta{font-size:12px;color:#a09880;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.narrow{display:flex;align-items:center;padding:0 16px;font-size:20px;color:#504840;flex-shrink:0;}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border:1px solid;border-radius:20px;}
.b-fin{color:#c8a96e;border-color:#3a2e18;background:#201a0c;}
.b-car{color:#7aaec8;border-color:#18263a;background:#0c1520;}
.b-sub{color:#504840;border-color:#302e2c;}

/* SLIDE ACTIONS */
.sla{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch;
transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);
z-index:3;overflow:hidden;border-radius:0 var(–r) var(–r) 0;}
.sla.vis{transform:translateX(0);}
.slb{display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:0 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;
gap:5px;min-width:68px;text-align:center;line-height:1.4;}
.sl-j{background:#0d1820;color:#7aaec8;}
.sl-uj{background:#1e1530;color:#b09ee0;}
.sl-r{background:#201a0a;color:#c8a96e;}
.sl-d{background:#200c0c;color:#c47a5a;}
.addb{margin-top:16px;}

/* SEARCH BAR — hidden at top, revealed on scroll down */
.srch-wrap{padding:0 14px 14px;background:#111110;}
.srch-bar{display:flex;gap:10px;}
.srch-in{flex:1;background:#222120;border:1px solid #302e2c;color:#e8e0d0;
font-family:inherit;font-size:15px;padding:12px 15px;outline:none;border-radius:10px;
caret-color:#c8a96e;-webkit-user-select:text!important;user-select:text!important;}
.srch-in:focus{border-color:#c8a96e;}
.srch-in::placeholder{color:#504840;}
.spath{font-size:12px;color:#7aaec8;margin-top:4px;}

/* MIND MAP */
#sh-mindmap{padding:0!important;overflow:hidden;position:relative;}
.mm-node{position:absolute;background:#222120;border:1px solid #302e2c;border-radius:10px;
padding:8px 14px;font-size:13px;font-weight:600;color:#e8e0d0;cursor:pointer;
white-space:nowrap;transform:translate(-50%,-50%);transition:background .1s;
box-shadow:0 2px 8px rgba(0,0,0,.4);}
.mm-node.final{border-color:#c8a96e;color:#c8a96e;background:#201a0c;}
.mm-node.root-lv{font-size:15px;font-weight:800;letter-spacing:1px;padding:12px 20px;}

/* CARNET */
.jsplit{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.jhalf{flex:1;display:flex;flex-direction:column;border-bottom:1px solid #302e2c;min-height:0;}
.jhalf:last-child{border-bottom:none;}
.jhdr{flex-shrink:0;padding:10px 16px;font-size:12px;font-weight:700;letter-spacing:2px;border-bottom:1px solid #252320;}
.jh-g{color:#c8a96e;}.jh-w{color:#c47a5a;}
.jlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;display:flex;flex-direction:column;gap:6px;}
.jlist::-webkit-scrollbar{width:3px;}
.jlist::-webkit-scrollbar-thumb{background:#302e2c;border-radius:2px;}
.jempty{font-size:13px;color:#504840;text-align:center;padding:24px 12px;line-height:2.4;}

/* FINAL */
.mtabs{display:flex;flex-shrink:0;background:#1a1917;border-bottom:1px solid #302e2c;}
.mtab{flex:1;padding:13px 4px;font-size:12px;font-weight:700;text-align:center;
cursor:pointer;border:none;background:none;color:#504840;
border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;font-family:inherit;}
.t-on.act{color:#6dbb8a;border-color:#6dbb8a;}
.t-al.act{color:#c47a5a;border-color:#c47a5a;}
.t-fu.act{color:#7aaec8;border-color:#7aaec8;}
.fbody{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* NOTE AREA */
.narea{flex:1;position:relative;min-height:0;border-bottom:1px solid #302e2c;}
.ntarea{position:absolute;inset:0;background:#111110;border:none;color:#e8e0d0;
font-family:inherit;font-size:15px;padding:16px;resize:none;outline:none;
line-height:1.9;caret-color:#c8a96e;
-webkit-user-select:text!important;user-select:text!important;
overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:1;}
.nview{position:absolute;inset:0;background:#111110;color:#e8e0d0;
font-family:inherit;font-size:15px;padding:16px;line-height:1.9;
white-space:pre-wrap;word-break:break-word;
overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:2;display:none;}
.lt{color:#c8a96e;text-decoration:underline;text-decoration-color:rgba(200,169,110,.4);
text-underline-offset:3px;cursor:pointer;}

/* VIDEO */
.vsec{flex-shrink:0;display:flex;flex-direction:column;max-height:44vh;border-top:1px solid #302e2c;}
.vhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;
border-bottom:1px solid #302e2c;background:#1a1917;flex-shrink:0;}
.vhdr-t{font-size:12px;font-weight:700;color:#a09880;letter-spacing:1.5px;}
.vlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:flex;flex-direction:column;gap:10px;}
.vlist::-webkit-scrollbar{width:3px;}
.vlist::-webkit-scrollbar-thumb{background:#302e2c;border-radius:2px;}
.vempty{font-size:13px;color:#504840;text-align:center;padding:14px;}
.vitem{background:#222120;border:1px solid #302e2c;border-radius:10px;overflow:hidden;flex-shrink:0;}
.vihdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #252320;}
.vlbl{font-size:12px;font-weight:600;color:#a09880;}
.viframe{position:relative;width:100%;padding-top:56.25%;background:#000;}
.viframe iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.shlink{padding:13px 15px;display:flex;align-items:center;gap:10px;}
.shlink a{color:#7aaec8;font-size:13px;text-decoration:none;word-break:break-all;
-webkit-user-select:text!important;user-select:text!important;}

/* LINK POPUP */
.ltp{position:fixed;z-index:3000;background:#1a1917;border:1px solid #302e2c;
border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.7);
min-width:220px;max-width:300px;overflow:hidden;display:none;}
.ltp.show{display:block;animation:sIn .14s ease;}
.ltp-hdr{padding:10px 14px;font-size:11px;font-weight:700;color:#a09880;
letter-spacing:1px;border-bottom:1px solid #302e2c;text-transform:uppercase;}
.ltp-item{padding:12px 14px;font-size:14px;font-weight:600;color:#e8e0d0;
cursor:pointer;border-bottom:1px solid #252320;}
.ltp-item:last-child{border-bottom:none;}
.ltp-item:active{background:#2c2b29;}
.ltp-path{font-size:11px;color:#a09880;margin-top:2px;font-weight:400;}

/* MODALS */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;
display:none;align-items:flex-end;justify-content:center;}
.mov.open{display:flex;animation:shIn .18s ease;}
@keyframes shIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.mbox{background:#1a1917;border:1px solid #302e2c;border-radius:20px 20px 0 0;
width:100%;max-width:540px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.mhdr{padding:18px 20px;border-bottom:1px solid #302e2c;font-size:16px;font-weight:700;
color:#e8e0d0;display:flex;align-items:center;justify-content:space-between;}
.mhdr-x{background:none;border:none;color:#a09880;font-size:24px;cursor:pointer;line-height:1;padding:2px;}
.mbody{padding:20px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:18px;}
.mfoot{padding:15px 20px;border-top:1px solid #302e2c;display:flex;gap:10px;justify-content:flex-end;}
.mlbl{font-size:11px;font-weight:700;color:#a09880;letter-spacing:1px;margin-bottom:7px;text-transform:uppercase;}
.mfield{display:flex;flex-direction:column;}
.min{background:#111110;border:1px solid #302e2c;color:#e8e0d0;font-family:inherit;
font-size:16px;padding:13px 15px;outline:none;border-radius:10px;caret-color:#c8a96e;width:100%;
-webkit-user-select:text!important;user-select:text!important;}
.min:focus{border-color:#c8a96e;}
.min::placeholder{color:#504840;}
.type-btns{display:flex;gap:10px;margin-top:6px;}
.type-btn{flex:1;background:#222120;border:1px solid #302e2c;color:#a09880;font-family:inherit;
font-size:14px;font-weight:600;padding:14px 10px;cursor:pointer;border-radius:10px;
text-align:center;transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.type-btn.sel{border-color:#c8a96e;color:#c8a96e;background:#211c12;}
.vtbtns{display:flex;gap:8px;flex-wrap:wrap;}
.vtbtn{background:#222120;border:1px solid #302e2c;color:#a09880;font-family:inherit;
font-size:14px;font-weight:600;padding:13px;cursor:pointer;border-radius:10px;transition:all .12s;}
.vtbtn.sel{border-color:#c8a96e;color:#c8a96e;background:#211c12;}
.tcwrap{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:8px;}
.tcdrum{display:flex;flex-direction:column;align-items:center;gap:7px;}
.tclbl{font-size:11px;font-weight:700;color:#504840;letter-spacing:1px;}
.tcdis{background:#111110;border:1px solid #c8a96e;color:#c8a96e;font-size:24px;font-weight:700;
width:62px;text-align:center;padding:9px 0;border-radius:8px;letter-spacing:2px;cursor:ns-resize;}
.tcbtn{background:#222120;border:1px solid #302e2c;color:#a09880;font-size:16px;
width:62px;padding:7px 0;cursor:pointer;text-align:center;border-radius:6px;font-family:inherit;}
.tcbtn:active{background:#2c2b29;}
.tcsep{font-size:28px;font-weight:300;color:#c8a96e;padding-top:26px;}
.yt-note{font-size:13px;color:#a09880;line-height:1.8;padding:12px 14px;background:#111110;border-radius:8px;border-left:3px solid #c8a96e;}

/* SETTINGS */
.slist{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.scard{background:#222120;border:1px solid #302e2c;border-radius:var(–r);padding:18px;display:flex;flex-direction:column;gap:10px;}
.slbl{font-size:14px;font-weight:700;color:#e8e0d0;}
.sdesc{font-size:13px;color:#a09880;line-height:1.8;}
.trow{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.tog{position:relative;width:48px;height:27px;flex-shrink:0;background:#111110;border:1px solid #302e2c;border-radius:14px;cursor:pointer;transition:background .2s,border-color .2s;}
.tog.on{background:#0e1f14;border-color:#6dbb8a;}
.tog::after{content:’’;position:absolute;top:3px;left:3px;width:19px;height:19px;background:#504840;border-radius:50%;transition:transform .2s,background .2s;}
.tog.on::after{transform:translateX(21px);background:#6dbb8a;}

/* DRAG GHOST */
#dgh{position:fixed;pointer-events:none;z-index:9999;opacity:.88;
transform:scale(1.03) rotate(.8deg);border-radius:var(–r);overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,.7);display:none;}
</style>

</head>
<body>

<div id="gt">
  <button class="bbk" id="tbk" onclick="topBack()">‹</button>
  <div id="tt"></div>
  <button class="bic" onclick="SFX.click();openSettings()">⚙</button>
</div>
<div id="gh"><button class="btn bhm" onclick="SFX.back();goHome()">⌂  Pièce principale</button></div>

<!-- HOME -->

<div id="sh-home" class="screen active">
  <div class="hm-panels">
    <button class="hm-panel hp-c" onclick="SFX.click();goCarnet()">
      <div class="hp-lbl" style="color:#c8a96e">CARNET</div>
    </button>
    <button class="hm-panel hp-b" id="home-btn-b" onclick="SFX.click();homeBtnB()">
      <div class="hp-lbl" id="home-lbl-b" style="color:#6dbb8a">BIBLIOTHÈQUE</div>
    </button>
  </div>
  <div class="hm-bot">
    <button class="btn bacc" onclick="SFX.click();openSettings()" style="font-size:16px;padding:13px 36px">⚙  Réglages</button>
  </div>
</div>

<!-- CARNET -->

<div id="sh-carnet" class="screen">
  <div class="jsplit" id="carnet-split"></div>
</div>

<!-- BIBLIOTHÈQUE -->

<div id="sh-biblio" class="screen">
  <div class="scr" id="bscroll">
    <div class="srch-wrap">
      <div class="srch-bar">
        <input class="srch-in" id="sinput" placeholder="🔍  Rechercher..." type="text">
        <button class="btn bsm bacc" onclick="SFX.click();doSearch()">OK</button>
      </div>
    </div>
    <div id="bcont"></div>
    <div id="bsrch" style="display:none"></div>
  </div>
</div>

<!-- FINAL -->

<div id="sh-final" class="screen">
  <div class="mtabs">
    <button class="mtab t-on" id="tab-on" onclick="SFX.tab();switchMode('on')">🟢  ON TEST</button>
    <button class="mtab t-al" id="tab-already" onclick="SFX.tab();switchMode('already')">🟠  ALREADY</button>
    <button class="mtab t-fu" id="tab-future" onclick="SFX.tab();switchMode('future')">🔵  FUTURE</button>
  </div>
  <div class="fbody">
    <div class="narea">
      <textarea class="ntarea" id="ntarea" placeholder="Notes..."></textarea>
      <div class="nview" id="nview"></div>
    </div>
    <div class="vsec">
      <div class="vhdr">
        <div class="vhdr-t">VIDÉOS</div>
        <button class="btn bsm bgr" onclick="SFX.click();openAddVid()">+ Ajouter</button>
      </div>
      <div class="vlist" id="vlist"></div>
    </div>
  </div>
</div>

<!-- SETTINGS -->

<div id="sh-settings" class="screen">
  <div class="slist">
    <div class="scard"><div class="slbl">🔊  Son</div><div class="trow"><div class="sdesc">Effets sonores</div><div class="tog on" id="stog" onclick="toggleSnd()"></div></div></div>
    <div class="scard">
      <div class="slbl">🧠  Mode</div>
      <div style="display:flex;gap:10px;margin-top:10px;">
        <button id="btn-mode-orig" onclick="setMode('original')"
          style="flex:1;padding:12px 8px;border-radius:10px;border:1px solid #c8a96e;background:#211c12;color:#c8a96e;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;">
          Original
        </button>

/* ══ AUDIO ══ */
const SFX=(()=>{
  let ctx=null,on=true;
  const gc=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;};
  const b=(f,d,t='sine',v=.07)=>{if(!on)return;try{const c=gc(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(v,c.currentTime+.012);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.012+d);o.start();o.stop(c.currentTime+.012+d+.02);}catch(e){}};
  const intro=()=>{if(!on)return;[[220,.1],[330,.08],[440,.08],[550,.12],[660,.08],[880,.18],[660,.06],[770,.2]].reduce((t,[f,d])=>{setTimeout(()=>b(f,d,'sine',.07),t*1000);return t+d*.8;},0);};
  return{click:()=>b(660,.04,'sine',.08),back:()=>{b(440,.03);setTimeout(()=>b(330,.06),45);},tab:()=>b(770,.04),nav:()=>b(550,.04),add:()=>{b(550,.04);setTimeout(()=>b(660,.06),60);},del:()=>{b(220,.07,'triangle',.08);setTimeout(()=>b(180,.09,'triangle',.06),70);},intro,set:v=>{on=v;},isOn:()=>on};
})();

/* ══ STATE ══ */
let S={tree:null,notes:{},snd:true,jourOrder:{}};
function loadS(){
  try{
    const d=localStorage.getItem('jjb_v9');
    if(d){S=JSON.parse(d);if(!S.tree)S.tree=cl(DT);if(!S.notes)S.notes={};if(!S.jourOrder)S.jourOrder={};}
    else S.tree=cl(DT);
  }catch(e){S.tree=cl(DT);S.notes={};}
  SFX.set(S.snd!==false);updSndUI();
}
function saveS(){try{localStorage.setItem('jjb_v9',JSON.stringify(S));}catch(e){}}
function cl(o){return JSON.parse(JSON.stringify(o));}
function nd(id){
  if(!S.notes[id])S.notes[id]={on:'',already:'',future:'',mode:'on',videos:{on:[],already:[],future:[]},inCarnet:false};
  const n=S.notes[id];
  if(!n.videos||Array.isArray(n.videos))n.videos={on:[],already:[],future:[]};
  if(n.inJournalier!==undefined&&n.inCarnet===undefined){n.inCarnet=n.inJournalier;delete n.inJournalier;}
  return n;
}

/* ══ TREE HELPERS ══ */
function fn(id,n){if(!n)n=S.tree;if(n.id===id)return n;for(const c of(n.children||[])){const r=fn(id,c);if(r)return r;}return null;}
function fp(id,n,p){if(!n)n=S.tree;if(n.id===id)return p;for(const c of(n.children||[])){const r=fp(id,c,n);if(r)return r;}return null;}
function gid(){return 'n'+Date.now()+'_'+Math.random().toString(36).slice(2,5);}
function getCat(id){function g(n){if(n.id===id)return n.category;for(const c of(n.children||[])){const r=g(c);if(r)return r;}return null;}return g(S.tree)||'grappling';}

/* propagate category to children */
function fixCats(node,cat){if(cat)node.category=cat;for(const c of(node.children||[]))fixCats(c,node.category);}

/* all nodes with path for link detection */
function allNodes(){
  const res=[];
  function w(n,path){
    if(n.id!=='root')res.push({id:n.id,name:n.name,isFinal:n.isFinal,path:path});
    for(const c of(n.children||[]))w(c,path?path+' › '+n.name:n.name);
  }
  w(S.tree,'');return res;
}
function norm(s){return s.toLowerCase().replace(/[-_]/g,' ').normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}

/* root child nodes (Grappling, Wrestling level) */
function rootChildren(){return S.tree.children||[];}

/* ══ NAV ══ */
/* historyStack entries: {screen, navStack, curFinalId, finalOrigin} */
let navStack=[],curFinalId=null,prevScr='home',finalOrigin='biblio';
let historyStack=[];

function pushHistory(screen){
  historyStack.push({screen,navStack:navStack.slice(),curFinalId,finalOrigin});
}

function setTopbar(id){
  const isHome=id==='home';
  document.getElementById('gt').classList.toggle('on',!isHome);
  document.getElementById('gh').classList.toggle('on',!isHome);
  if(isHome)return;
  const titles={carnet:'Carnet',settings:'Réglages'};
  if(id==='final'){document.getElementById('tt').textContent=fn(curFinalId)?.name||'Technique';}
  else if(id==='biblio'){
    const node=navStack.length>1?fn(navStack[navStack.length-1]):null;
    document.getElementById('tt').textContent=navStack.length>1?(node?.name||'Bibliothèque'):'Bibliothèque';
  } else {
    document.getElementById('tt').textContent=titles[id]||id;
  }
  // back button always visible when there's history, hidden only on biblio root with no history
  const hasHistory=historyStack.length>0;
  document.getElementById('tbk').style.visibility=hasHistory?'visible':'hidden';
}

function scr(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sh-'+id).classList.add('active');
  setTopbar(id);
}

function topBack(){
  SFX.back();
  if(historyStack.length===0){goHome();return;}
  const prev=historyStack.pop();
  // restore state
  navStack=prev.navStack.slice();
  curFinalId=prev.curFinalId;
  finalOrigin=prev.finalOrigin;
  const s=prev.screen;
  if(s==='biblio'){renderBiblio();}
  else if(s==='carnet'){renderCarnet();}
  else if(s==='mindmap'){mmLayout();mmDraw();mmAttachEvents();}
  else if(s==='final'){
    // re-open final with restored state
    const ndata=nd(curFinalId);
    const mode=ndata.mode||'on';
    document.getElementById('tt').textContent=fn(curFinalId)?.name||'Technique';
    showTA();
    document.getElementById('ntarea').value=ndata[mode]||'';
    document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('act'));
    document.getElementById('tab-'+mode).classList.add('act');
    renderVids();
  }
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.getElementById('sh-'+s).classList.add('active');
  setTopbar(s);
}

function goHome(){historyStack=[];navStack=[];scr('home');}
function goCarnet(){pushHistory('home');renderCarnet();scr('carnet');}
function goBiblio(){pushHistory('home');navStack=['root'];renderBiblio();scr('biblio');}

/* carnet header colors cycle for extra sections */
const CAT_COLORS=['#c8a96e','#c47a5a','#7aaec8','#6dbb8a','#b09ee0','#a09880'];

  // kept for rename refresh — just re-render carnet
  renderCarnet();
}

function renderCarnet(){
  const split=document.getElementById('carnet-split');
  split.innerHTML='';
  const rootKids=S.tree.children||[];
  rootKids.forEach((rk,idx)=>{
    const color=CAT_COLORS[idx%CAT_COLORS.length];
    const half=document.createElement('div');half.className='jhalf';
    const hdr=document.createElement('div');hdr.className='jhdr';
    hdr.style.color=color;hdr.textContent='◈  '+rk.name.toUpperCase();
    const list=document.createElement('div');list.className='jlist';list.id='jlist-'+rk.id;
    half.appendChild(hdr);half.appendChild(list);
    split.appendChild(half);
    // populate
    const ids=collectCarnetIds(rk.id);
    const ord=getCarnetOrder(rk.id);
    ids.sort((a,b)=>{let ai=ord.indexOf(a),bi=ord.indexOf(b);if(ai<0)ai=999;if(bi<0)bi=999;return ai-bi;});
    if(!ids.length){list.innerHTML=`<div class="jempty">Aucun raccourci<br>← Ajoute depuis Bibliothèque</div>`;}
    else ids.forEach(id=>{const node=fn(id);if(node)list.appendChild(mkCarnetCard(node));});
  });
}
let aSlide=null;

function renderBiblio(){
  const cid=navStack[navStack.length-1];
  const node=fn(cid);
  // Update topbar title
  document.getElementById('tbk').style.visibility=historyStack.length>0?'visible':'hidden';
  document.getElementById('tt').textContent=cid==='root'?'Bibliothèque':(node?.name||'Bibliothèque');
  // Reset search
  document.getElementById('bsrch').style.display='none';
  document.getElementById('bcont').style.display='';
  document.getElementById('sinput').value='';
  const cont=document.getElementById('bcont');
  cont.innerHTML='';
  if(!node)return;

  if(cid==='root'){
    // root children shown as normal cards (can go to carnet, rename, delete, drag)
    node.children.forEach(child=>cont.appendChild(mkCard(child)));

    const ab=document.createElement('div');ab.className='addb';

    const b1=document.createElement('button');b1.className='btn bsm';b1.textContent='+ Livre';
    b1.onclick=()=>{SFX.click();openAN(cid);};
    ab.appendChild(b1);cont.appendChild(ab);
  }
}

function mkCard(child){
  const w=document.createElement('div');w.className='ncw';w.dataset.id=child.id;
  const ndata=nd(child.id);
  const sa=document.createElement('div');sa.className='sla';
  if(ndata.inCarnet){
    const b=mkSlb('sl-uj','📋','Retirer\nCarnet');b.onclick=e=>{e.stopPropagation();SFX.click();rmCarnet(child.id);closeSlide();};sa.appendChild(b);
  } else {
    const b=mkSlb('sl-j','📋','Ajouter\nCarnet');b.onclick=e=>{e.stopPropagation();SFX.click();addCarnet(child.id);closeSlide();};sa.appendChild(b);
  }
  const br=mkSlb('sl-r','✏️','Modifier');br.onclick=e=>{e.stopPropagation();SFX.click();openRN(child.id,child.name);closeSlide();};sa.appendChild(br);
  const bd=mkSlb('sl-d','🗑','Suppr');bd.onclick=e=>{e.stopPropagation();SFX.del();confirmDel(child.id);closeSlide();};sa.appendChild(bd);
  w.appendChild(sa);

  const card=document.createElement('div');card.className='nc';
  const strip=document.createElement('div');strip.className='nstrip';
  if(child.isFinal){const m=ndata.mode||'on';strip.classList.add(m==='on'?'s-on':m==='already'?'s-al':'s-fu');}
  else strip.classList.add('s-no');
  card.appendChild(strip);
  const body=document.createElement('div');body.className='nbody';
  const ttEl=document.createElement('div');ttEl.className='ntitle';ttEl.textContent=child.name;body.appendChild(ttEl);
  const meta=document.createElement('div');meta.className='nmeta';
  if(child.isFinal){const b=document.createElement('span');b.className='badge b-fin';b.textContent='★ Feuille';meta.appendChild(b);}
  else if(child.children?.length){const s=document.createElement('span');s.className='badge b-sub';s.textContent=child.children.length+' livre'+(child.children.length>1?'s':'');meta.appendChild(s);}
  if(ndata.inCarnet){const b=document.createElement('span');b.className='badge b-car';b.textContent='📋 Carnet';meta.appendChild(b);}
  body.appendChild(meta);card.appendChild(body);
  card.appendChild(Object.assign(document.createElement('div'),{className:'narrow',textContent:'›'}));
  w.appendChild(card);
  attachTouch(card,w,sa,child,false);
  return w;
}

function attachTouch(card,w,sa,child,isCarnet){
  const isRootChild=!isCarnet&&navStack.length>0&&navStack[navStack.length-1]==='root';
  let t0x=0,t0y=0,moved=false,lpFired=false,lpTimer=null,swOK=false;
  card.addEventListener('touchstart',e=>{
    const t=e.touches[0];t0x=t.clientX;t0y=t.clientY;moved=false;lpFired=false;swOK=false;
    if(!isRootChild){
      lpTimer=setTimeout(()=>{if(moved)return;lpFired=true;w.classList.add('lp-active');SFX.click();
        startDrag(child.id,w,t,isCarnet?child.category:null);
        setTimeout(()=>w.classList.remove('lp-active'),300);
      },500);
    }
  },{passive:true});

/* ══ DRAG REORDER ══ */
let dragId=null,dragOverId=null,dragGEl=null,dragOX=0,dragOY=0,dragCat=null;
function startDrag(nodeId,wrapper,touch,cat){
  dragId=nodeId;dragCat=cat;
  const rect=wrapper.getBoundingClientRect();dragOX=touch.clientX-rect.left;dragOY=touch.clientY-rect.top;
  const ghost=document.getElementById('dgh');ghost.innerHTML='';
  const clone=wrapper.cloneNode(true);clone.querySelector('.sla')?.remove();clone.style.width=rect.width+'px';
  ghost.appendChild(clone);ghost.style.cssText=`display:block;width:${rect.width}px;top:${rect.top}px;left:${rect.left}px;`;
  dragGEl=ghost;wrapper.classList.add('drag-src');
  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('touchend',onDragEnd,{passive:true});
}
function onDragMove(e){
  if(!dragGEl)return;e.preventDefault();const t=e.touches[0];
  dragGEl.style.top=(t.clientY-dragOY)+'px';dragGEl.style.left=(t.clientX-dragOX)+'px';
  dragGEl.style.visibility='hidden';const el=document.elementFromPoint(t.clientX,t.clientY);dragGEl.style.visibility='';
  document.querySelectorAll('.ncw.drag-over,.rc-wrap .ncw.drag-over').forEach(w=>w.classList.remove('drag-over'));
  const tgt=el?.closest('.ncw');
  if(tgt&&tgt.dataset.id&&tgt.dataset.id!==dragId){
    if(dragCat){if(getRootChildId(tgt.dataset.id)!==dragCat)return;}
    dragOverId=tgt.dataset.id;tgt.classList.add('drag-over');
  } else dragOverId=null;
}
function onDragEnd(){
  document.removeEventListener('touchmove',onDragMove);document.removeEventListener('touchend',onDragEnd);
  if(dragGEl){dragGEl.style.display='none';dragGEl.innerHTML='';}
  document.querySelectorAll('.drag-src').forEach(w=>w.classList.remove('drag-src'));
  document.querySelectorAll('.drag-over').forEach(w=>w.classList.remove('drag-over'));
  if(dragId&&dragOverId&&dragId!==dragOverId){
    if(dragCat){reorderCarnet(dragId,dragOverId,dragCat);}
    else{
      // biblio or root reorder
      const cid=navStack[navStack.length-1];const p=fn(cid);
      if(p){const c=p.children;const ai=c.findIndex(x=>x.id===dragId),bi=c.findIndex(x=>x.id===dragOverId);if(ai>=0&&bi>=0){const[it]=c.splice(ai,1);c.splice(bi,0,it);saveS();renderBiblio();}}
    }
  }
  dragId=null;dragOverId=null;dragCat=null;
}

/* ══ CARNET ORDER ══ */
/* get the direct child of root that is ancestor of nodeId */
function getRootChildId(nodeId){
  for(const rk of (S.tree.children||[])){
    function wk(n){if(n.id===nodeId)return true;for(const c of(n.children||[])){if(wk(c))return true;}return false;}
    if(wk(rk))return rk.id;
  }
  return null;
}
function getCarnetOrder(rootChildId){if(!S.jourOrder)S.jourOrder={};if(!S.jourOrder[rootChildId])S.jourOrder[rootChildId]=[];return S.jourOrder[rootChildId];}
function collectCarnetIds(rootChildId){
  const arr=[];
  const rk=fn(rootChildId);
  if(!rk)return arr;
  function w(n){if(S.notes[n.id]?.inCarnet)arr.push(n.id);for(const c of(n.children||[]))w(c);}
  w(rk);return arr;
}
function reorderCarnet(srcId,tgtId,rootChildId){
  const all=collectCarnetIds(rootChildId);const order=getCarnetOrder(rootChildId);
  all.forEach(id=>{if(!order.includes(id))order.push(id);});
  const ai=order.indexOf(srcId),bi=order.indexOf(tgtId);if(ai<0||bi<0)return;
  const[it]=order.splice(ai,1);order.splice(bi,0,it);S.jourOrder[rootChildId]=order;saveS();renderCarnet();
}

/* ══ RENDER VIEW WITH LINKED TERMS ══ */
function renderView(){
  const vw=document.getElementById('nview');
  if(!curFinalId){vw.innerHTML='';return;}
  const ndata=nd(curFinalId);
  const mode=ndata.mode||'on';
  const text=ndata[mode]||'';
  if(!text.trim()){vw.innerHTML='';return;}

  // gather all nodes except current, sorted longest-name first
  const nodes=allNodes().filter(n=>n.id!==curFinalId);
  nodes.sort((a,b)=>b.name.length-a.name.length);
  if(!nodes.length){vw.textContent=text;return;}

  // build regex patterns from node names, applied directly to original text (case-insensitive, accent-aware via norm)
  // We match in original text using original names but case-insensitively
  // Group by normed name so multiple nodes with same normed name share one pattern
  const byNormed={};
  nodes.forEach(n=>{
    const k=norm(n.name);
    if(!byNormed[k])byNormed[k]=[];
    byNormed[k].push(n);
  });

  // Build regex that matches original node names case-insensitively in original text
  // For each unique normed name, we use the original name as pattern (longest first already)
  const patterns=[];
  nodes.forEach(n=>{
    // escape the original name for regex
    const escaped=n.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    patterns.push({re:escaped,nodes:byNormed[norm(n.name)],normed:norm(n.name)});
  });
  // deduplicate patterns by normed key
  const seen=new Set();
  const uniquePats=patterns.filter(p=>{if(seen.has(p.normed))return false;seen.add(p.normed);return true;});

  const rx=new RegExp('('+uniquePats.map(p=>p.re).join('|')+')','gi');
  const hits=[];let m;
  while((m=rx.exec(text))!==null){
    const start=m.index,end=m.index+m[0].length;
    const matchedNorm=norm(m[0]);
    const matchingNodes=byNormed[matchedNorm];
    if(matchingNodes&&matchingNodes.length)hits.push({start,end,nodes:matchingNodes});
  }
  // remove overlapping hits (keep first)
  const clean=[];let lastEnd=-1;
  hits.forEach(h=>{if(h.start>=lastEnd){clean.push(h);lastEnd=h.end;}});

  vw.innerHTML='';
  let pos=0;
  clean.forEach(h=>{
    if(h.start>pos)vw.appendChild(document.createTextNode(text.slice(pos,h.start)));
    const sp=document.createElement('span');sp.className='lt';
    sp.textContent=text.slice(h.start,h.end);
    const mn=h.nodes;
    sp.addEventListener('click',e=>{e.stopPropagation();showLinkPopup(mn,sp.textContent,e);});
    vw.appendChild(sp);
    pos=h.end;
  });
  if(pos<text.length)vw.appendChild(document.createTextNode(text.slice(pos)));
}

// Polyfill canvas roundRect for older Safari
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);this.closePath();return this;
  };
}

// Shared tree with biblio — all ops mutate S.tree directly
let mmTx=0,mmTy=0,mmScale=1;
let mmPinching=false;
let mmDragStart={x:0,y:0,tx:0,ty:0};
let mmPinchDist=0;
let mmNodes=[];   // {id, x, y, w, h, node, depth, color}
let mmEdges=[];   // {x1,y1,x2,y2,color,midX,midY,parentId,childId}
let mmCanvas=null,mmCtx=null;
const MM_COLORS=['#c8a96e','#c47a5a','#7aaec8','#6dbb8a','#b09ee0','#a09880'];

function mmOpen(){
  scr('mindmap');
  document.getElementById('tt').textContent='Mind Map';
  document.getElementById('tbk').style.visibility='visible';
  mmCanvas=document.getElementById('mm-canvas');
  mmCtx=mmCanvas.getContext('2d');
  mmResize();
  mmLayout();
  mmDraw();
  mmAttachEvents();
}

function mmResize(){
  // Set canvas resolution to fill the screen correctly
  const pw=mmCanvas.parentElement.clientWidth||window.innerWidth;
  const ph=mmCanvas.parentElement.clientHeight||window.innerHeight;
  const dpr=window.devicePixelRatio||1;
  mmCanvas.width=pw*dpr;
  mmCanvas.height=ph*dpr;
  mmCanvas.style.width=pw+'px';
  mmCanvas.style.height=ph+'px';
  mmCtx.setTransform(dpr,0,0,dpr,0,0);
}

function mmLayout(){
  mmNodes=[];mmEdges=[];
  mmTx=0;mmTy=0;mmScale=1;
  const pw=mmCanvas.clientWidth||window.innerWidth;
  const ph=mmCanvas.clientHeight||window.innerHeight;
  const cx=pw/2,cy=ph/2;
  const rootKids=S.tree.children||[];
  const rk_count=rootKids.length||1;
  rootKids.forEach((rk,ri)=>{
    const angle=(2*Math.PI*ri/rk_count)-Math.PI/2;
    const r1=Math.min(pw,ph)*0.3;
    const rx=cx+r1*Math.cos(angle);
    const ry=cy+r1*Math.sin(angle);
    const color=MM_COLORS[ri%MM_COLORS.length];
    mmNodes.push({id:rk.id,x:rx,y:ry,node:rk,depth:1,color});
    mmEdges.push({x1:cx,y1:cy,x2:rx,y2:ry,color,midX:(cx+rx)/2,midY:(cy+ry)/2,parentId:'root',childId:rk.id});
    mmLayoutChildren(rk,rx,ry,angle,r1*0.68,2,color);
  });
}

function mmLayoutChildren(parent,px,py,baseAngle,radius,depth,color){
  const kids=parent.children||[];if(!kids.length)return;
  const maxSpread=depth<=2?Math.PI*0.85:Math.PI*0.7;
  const spread=Math.min(maxSpread,Math.PI/(depth*0.5));
  const step=kids.length>1?spread/(kids.length-1):0;
  const startAngle=baseAngle-(spread/2);
  kids.forEach((child,ci)=>{
    const angle=kids.length===1?baseAngle:startAngle+step*ci;
    const r=Math.max(radius,70);
    const cx2=px+r*Math.cos(angle);
    const cy2=py+r*Math.sin(angle);
    const c=child.isFinal?'#c8a96e':color;
    mmNodes.push({id:child.id,x:cx2,y:cy2,node:child,depth,color:c,isFinal:child.isFinal});
    mmEdges.push({x1:px,y1:py,x2:cx2,y2:cy2,color,midX:(px+cx2)/2,midY:(py+cy2)/2,parentId:parent.id,childId:child.id});
    mmLayoutChildren(child,cx2,cy2,angle,r*0.72,depth+1,color);
  });
}

const MM_PLUS_R=10; // radius of + button on edge midpoint

function mmDraw(){
  if(!mmCtx||!mmCanvas)return;
  const pw=mmCanvas.clientWidth,ph=mmCanvas.clientHeight;
  mmCtx.clearRect(0,0,pw,ph);
  mmCtx.save();
  // apply pan+zoom centered on screen center
  mmCtx.translate(pw/2+mmTx,ph/2+mmTy);
  mmCtx.scale(mmScale,mmScale);
  mmCtx.translate(-pw/2,-ph/2);

  // draw edges + mid-point + buttons
  mmEdges.forEach(e=>{
    if(e.parentId==='root')return; // skip root→rk edges (drawn as lines below)
    mmCtx.beginPath();
    mmCtx.moveTo(e.x1,e.y1);
    // curved line
    const dx=e.x2-e.x1,dy=e.y2-e.y1;
    const cpx=e.x1+dx*0.5-dy*0.08,cpy=e.y1+dy*0.5+dx*0.08;
    mmCtx.quadraticCurveTo(cpx,cpy,e.x2,e.y2);
    mmCtx.strokeStyle=e.color+'66';
    mmCtx.lineWidth=1.5/mmScale;
    mmCtx.stroke();
    // + button circle at midpoint
    mmCtx.beginPath();
    mmCtx.arc(e.midX,e.midY,MM_PLUS_R/mmScale,0,Math.PI*2);
    mmCtx.fillStyle='#222120';
    mmCtx.fill();
    mmCtx.strokeStyle=e.color+'99';
    mmCtx.lineWidth=1/mmScale;
    mmCtx.stroke();
    // + sign
    const pr=MM_PLUS_R/mmScale,ps=pr*0.55;
    mmCtx.beginPath();
    mmCtx.moveTo(e.midX-ps,e.midY);mmCtx.lineTo(e.midX+ps,e.midY);
    mmCtx.moveTo(e.midX,e.midY-ps);mmCtx.lineTo(e.midX,e.midY+ps);
    mmCtx.strokeStyle=e.color;mmCtx.lineWidth=1.5/mmScale;mmCtx.stroke();
  });
  // root-level edges (straight lines to root kids)
  mmEdges.forEach(e=>{
    if(e.parentId!=='root')return;
    mmCtx.beginPath();mmCtx.moveTo(e.x1,e.y1);mmCtx.lineTo(e.x2,e.y2);
    mmCtx.strokeStyle=e.color+'44';mmCtx.lineWidth=2/mmScale;mmCtx.stroke();
  });

  // draw nodes
  mmNodes.forEach(n=>{
    const label=n.node.name;
    const fs=n.depth===1?14:12;
    mmCtx.font=`${n.depth===1?700:600} ${fs}px -apple-system,BlinkMacSystemFont,sans-serif`;
    const tw=mmCtx.measureText(label).width;
    const nw=tw+22,nh=fs+18;
    const nx=n.x-nw/2,ny=n.y-nh/2;
    mmCtx.fillStyle=n.isFinal?'#201a0c':(n.depth===1?'#2c2b29':'#222120');
    mmCtx.beginPath();mmCtx.roundRect(nx,ny,nw,nh,7);mmCtx.fill();
    mmCtx.strokeStyle=n.isFinal?'#c8a96e':(n.depth===1?n.color:n.color+'77');
    mmCtx.lineWidth=(n.depth===1?1.5:1)/mmScale;mmCtx.stroke();
    mmCtx.fillStyle=n.isFinal?'#c8a96e':'#e8e0d0';
    mmCtx.textAlign='center';mmCtx.textBaseline='middle';
    mmCtx.fillText(label,n.x,n.y);
    // store hit box (world coords)
    n.hitX=nx;n.hitY=ny;n.hitW=nw;n.hitH=nh;
  });
  // center dot
  const pw2=pw,ph2=ph;
  mmCtx.beginPath();mmCtx.arc(pw2/2,ph2/2,5,0,Math.PI*2);
  mmCtx.fillStyle='#c8a96e22';mmCtx.fill();
  mmCtx.restore();
}

function mmScreenToWorld(sx,sy){
  const pw=mmCanvas.clientWidth,ph=mmCanvas.clientHeight;
  return{x:(sx-(pw/2+mmTx))/mmScale+pw/2,y:(sy-(ph/2+mmTy))/mmScale+ph/2};
}

function mmHitTestNode(wx,wy){
  for(let i=mmNodes.length-1;i>=0;i--){
    const n=mmNodes[i];
    if(wx>=n.hitX&&wx<=n.hitX+n.hitW&&wy>=n.hitY&&wy<=n.hitY+n.hitH)return n;
  }
  return null;
}

function mmHitTestEdgePlus(wx,wy){
  const pr=MM_PLUS_R/mmScale+4;
  for(let i=mmEdges.length-1;i>=0;i--){
    const e=mmEdges[i];
    if(e.parentId==='root')continue;
    const d=Math.hypot(wx-e.midX,wy-e.midY);
    if(d<=pr)return e;
  }
  return null;
}

let mmTouchMoved=false,mmLpTimer=null,mmPt1=null,mmPt2=null,mmEventsAttached=false;

function mmAttachEvents(){
  // Clone canvas to wipe old listeners
  const old=document.getElementById('mm-canvas');
  const nc=old.cloneNode(false);
  old.parentNode.replaceChild(nc,old);
  mmCanvas=nc;
  mmCtx=nc.getContext('2d');
  mmResize();
  mmDraw();

  mmCanvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length===2){
      mmPinching=true;
      mmPt1={x:e.touches[0].clientX,y:e.touches[0].clientY};
      mmPt2={x:e.touches[1].clientX,y:e.touches[1].clientY};
      mmPinchDist=Math.hypot(mmPt2.x-mmPt1.x,mmPt2.y-mmPt1.y);
    } else if(e.touches.length===1){
      mmPinching=false;
      const t=e.touches[0];
      mmDragStart={x:t.clientX,y:t.clientY,tx:mmTx,ty:mmTy};
      mmTouchMoved=false;
      mmLpTimer=setTimeout(()=>{
        if(!mmTouchMoved){
          const w=mmScreenToWorld(t.clientX,t.clientY);
          const hit=mmHitTestNode(w.x,w.y);
          if(hit)mmContextMenu(hit,t.clientX,t.clientY);
        }
      },500);
    }
  },{passive:false});

  mmCanvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===2&&mmPinching){
      const p1={x:e.touches[0].clientX,y:e.touches[0].clientY};
      const p2={x:e.touches[1].clientX,y:e.touches[1].clientY};
      const newDist=Math.hypot(p2.x-p1.x,p2.y-p1.y);
      mmScale=Math.max(0.15,Math.min(5,mmScale*(newDist/mmPinchDist)));
      mmPinchDist=newDist;
      const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
      const omx=(mmPt1.x+mmPt2.x)/2,omy=(mmPt1.y+mmPt2.y)/2;
      mmTx+=mx-omx;mmTy+=my-omy;
      mmPt1=p1;mmPt2=p2;
      mmDraw();
    } else if(e.touches.length===1&&!mmPinching){
      const t=e.touches[0];
      const dx=t.clientX-mmDragStart.x,dy=t.clientY-mmDragStart.y;
      if(Math.abs(dx)>5||Math.abs(dy)>5){mmTouchMoved=true;clearTimeout(mmLpTimer);}
      mmTx=mmDragStart.tx+dx;mmTy=mmDragStart.ty+dy;
      mmDraw();
    }
  },{passive:false});

  mmCanvas.addEventListener('touchend',e=>{
    clearTimeout(mmLpTimer);
    if(mmPinching&&e.touches.length<2){mmPinching=false;return;}
    if(!mmTouchMoved&&e.changedTouches.length===1){
      const t=e.changedTouches[0];
      const w=mmScreenToWorld(t.clientX,t.clientY);
      // check + button first
      const ep=mmHitTestEdgePlus(w.x,w.y);
      if(ep){SFX.click();mmAddChildModal(ep.parentId);return;}
      // then node tap
      const hit=mmHitTestNode(w.x,w.y);
      if(hit){
        SFX.nav();
        if(hit.node.isFinal){openFinal(hit.node.id,'mindmap');}
        else{mmZoomTo(hit);}
      }
    }
  },{passive:true});

  // Mouse (desktop)
  let mmMD=false,mmMM=false;
  mmCanvas.addEventListener('mousedown',e=>{mmMD=true;mmMM=false;mmDragStart={x:e.clientX,y:e.clientY,tx:mmTx,ty:mmTy};});
  mmCanvas.addEventListener('mousemove',e=>{
    if(!mmMD)return;
    const dx=e.clientX-mmDragStart.x,dy=e.clientY-mmDragStart.y;
    if(Math.abs(dx)>4||Math.abs(dy)>4)mmMM=true;
    mmTx=mmDragStart.tx+dx;mmTy=mmDragStart.ty+dy;mmDraw();
  });
  mmCanvas.addEventListener('mouseup',e=>{
    mmMD=false;
    if(!mmMM){
      const w=mmScreenToWorld(e.clientX,e.clientY);
      const ep=mmHitTestEdgePlus(w.x,w.y);
      if(ep){SFX.click();mmAddChildModal(ep.parentId);return;}
      const hit=mmHitTestNode(w.x,w.y);
      if(hit){SFX.nav();if(hit.node.isFinal)openFinal(hit.node.id,'mindmap');else mmZoomTo(hit);}
    }
  });
  mmCanvas.addEventListener('wheel',e=>{
    e.preventDefault();
    mmScale=Math.max(0.15,Math.min(5,mmScale*(e.deltaY>0?0.9:1.1)));mmDraw();
  },{passive:false});
  mmCanvas.addEventListener('dblclick',e=>{
    const w=mmScreenToWorld(e.clientX,e.clientY);
    const hit=mmHitTestNode(w.x,w.y);
    if(hit)mmContextMenu(hit,e.clientX,e.clientY);
  });
}

function mmZoomTo(n){
  const pw=mmCanvas.clientWidth,ph=mmCanvas.clientHeight;
  mmTx=-(n.x-pw/2)*mmScale;mmTy=-(n.y-ph/2)*mmScale;
  mmDraw();
}
function mmReset(){mmTx=0;mmTy=0;mmScale=1;mmDraw();}

    ...(n.depth>1?[{lbl:'🗑 Supprimer',fn:()=>{pop.remove();confirmDel(n.node.id);}}]:[]),
  ];
  acts.forEach((a,idx)=>{
    const d=document.createElement('div');
    d.style.cssText=`padding:13px 16px;font-size:14px;font-weight:600;color:#e8e0d0;cursor:pointer;${idx<acts.length-1?'border-bottom:1px solid #252320;':''}`;
    d.textContent=a.lbl;d.onclick=a.fn;
    pop.appendChild(d);
  });
  document.body.appendChild(pop);
  setTimeout(()=>document.addEventListener('touchstart',function x(ev){if(!pop.contains(ev.target)){pop.remove();}document.removeEventListener('touchstart',x);},{once:true,passive:true}),150);
  setTimeout(()=>document.addEventListener('click',function x(ev){if(!pop.contains(ev.target)){pop.remove();}document.removeEventListener('click',x);},{once:true}),150);
}

/* After any tree mutation, if mind map visible → re-layout + redraw */
function mmMaybeRefresh(){
  if(document.getElementById('sh-mindmap')?.classList.contains('active')){
    mmLayout();mmDraw();
  }
}

document.addEventListener('click',pi,{once:true});
