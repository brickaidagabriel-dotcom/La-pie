<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJB Vault V28.2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg: #000; --card: #1c1c1e; --text: #fff; --turquoise: #00f2ff; 
            --danger: #ff453a; --edit: #5e5ce6; --accent: #0a84ff;
            --on-test: #30d158; --already: #ff9f0a; --future: #00f2ff;
        }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid #333; position: sticky; top:0; z-index: 100; }
        .version-tag { position: absolute; top: 5px; left: 10px; font-size: 9px; color: var(--turquoise); font-weight: bold; }
        .nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; height: 30px; }
        .back-btn { color: var(--turquoise); font-weight: bold; font-size: 16px; background: none; border: none; cursor: pointer; }
        
        .container { padding: 15px; }
        .btn-add { background: var(--turquoise); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; font-size: 16px; }
        
        /* LIST SYSTEM */
        .item-wrapper { position: relative; margin-bottom: 10px; background: #333; border-radius: 12px; overflow: hidden; }
        .item-actions { position: absolute; right: 0; top: 0; height: 100%; display: flex; z-index: 1; }
        .action-btn { width: 65px; border: none; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .item-main { background: var(--card); padding: 22px 20px; position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; transition: transform 0.3s ease; cursor: pointer; }
        .swiped .item-main { transform: translateX(-195px); }

        .status-on_test { border-left: 5px solid var(--on-test) !important; }
        .status-already { border-left: 5px solid var(--already) !important; }
        .status-future { border-left: 5px solid var(--future) !important; }

        /* EDITOR SPLIT */
        #note-editor { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; flex-direction:column; }
        .tabs { display: flex; gap: 8px; padding: 12px; background: #111; }
        .tab { flex: 1; padding: 12px 5px; border-radius: 8px; font-size: 11px; font-weight: bold; text-align: center; opacity: 0.3; color: #000; }
        .tab.active { opacity: 1; border: 2px solid white; }
        .text-pane { flex: 1; position: relative; border-bottom: 2px solid #333; }
        #note-display { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; color: white; font-size: 17px; white-space: pre-wrap; pointer-events: none; overflow-y: auto; z-index:1; }
        #note-textarea { width: 100%; height: 100%; background: transparent; border: none; color: transparent; caret-color: white; padding: 20px; font-size: 17px; resize: none; outline: none; -webkit-user-select: text; user-select: text; position: relative; z-index:2; }
        .video-pane { flex: 1; background: #000; overflow-y: auto; padding: 10px; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; justify-content:center; align-items:center; }
        .modal-content { background:var(--card); padding:25px; border-radius:20px; width:85%; border: 1px solid var(--turquoise); }
        nav { position:fixed; bottom:0; width:100%; height:75px; background:var(--card); display:flex; justify-content:center; align-items:center; border-top:1px solid #333; z-index:100; }
    </style>
</head>
<body>

<div id="main-view">
    <div class="header">
        <div class="version-tag">V28.2.0</div>
        <div class="nav-top">
            <button id="btn-back" class="back-btn" onclick="goBack()" style="visibility: hidden;">〈 Retour</button>
            <span id="path-display" style="font-size:10px; color:var(--turquoise);">ACCUEIL</span>
        </div>
        <h2 id="view-title" style="margin:0; font-weight: 800;">JJB Vault</h2>
    </div>
    <div id="app-content" class="container"></div>
    <nav><button onclick="goHome()" style="background:none; border:none; font-size:32px;">🏠</button></nav>
</div>

<div id="note-editor">
    <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="closeEditor()" class="back-btn">〈 Retour</button>
        <h3 id="editor-title" style="margin:0; font-size:16px;">Note</h3>
        <div style="width:40px;"></div>
    </div>
    <div class="tabs">
        <div class="tab" id="tab-on_test" style="background:var(--on-test)" onclick="switchTab('on_test')">ON TEST</div>
        <div class="tab" id="tab-already" style="background:var(--already)" onclick="switchTab('already')">ALREADY</div>
        <div class="tab" id="tab-future" style="background:var(--future)" onclick="switchTab('future')">FUTURE</div>
    </div>
    <div class="text-pane">
        <div id="note-display"></div>
        <textarea id="note-textarea" spellcheck="false" oninput="handleInput()" onscroll="syncScroll()"></textarea>
    </div>
    <div class="video-pane" id="video-list"></div>
</div>

<div id="item-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="color:var(--turquoise);">Nouveau</h3>
        <input type="text" id="item-input" style="width:100%; padding:12px; background:#2c2c2e; border:1px solid #444; color:#fff; border-radius:10px; margin-bottom:15px;">
        <div id="tech-opt" style="margin-bottom:20px;">
            <label style="color:#fff;"><input type="checkbox" id="is-tech"> Fenêtre Finale</label>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal('item-modal')" style="flex:1; padding:12px; background:#444; border:none; border-radius:8px; color:#fff;">Annuler</button>
            <button id="modal-confirm" style="flex:1; padding:12px; background:var(--turquoise); border:none; border-radius:8px; font-weight:bold;">Valider</button>
        </div>
    </div>
</div>

<script>
    const tree = {
        "Grappling": { type: "folder", order: ["Top", "Bottom", "Submissions"], children: {
            "Top": { type: "folder", order: ["Pin", "Passing"], children: {
                "Pin": { type: "folder", order: ["Mount", "Side Control", "Ride"], children: { "Mount":{}, "Side Control":{}, "Ride":{} }},
                "Passing": { type: "folder", order: ["Half Guard Pass", "Outside Pass"], children: {
                    "Half Guard Pass": { type: "folder", order: ["Chest-to-Chest", "Half Guard", "Knee Shield Half Guard"], children: {
                        "Knee Shield Half Guard": { type: "folder", order: ["High Knee Shield", "Medium Knee Shield", "Low Knee Shield"], children: {
                            "Medium Knee Shield": { type: "folder", order: ["Knee Elbow Open", "Knee Elbow Close"], children: { "Knee Elbow Open":{}, "Knee Elbow Close":{} }}
                        }}
                    }}
                }}
            }},
            "Bottom": { type: "folder", order: ["Closed Guard", "Half Guard", "Open Seated", "Open Supine", "Pin Escape"], children: {
                "Pin Escape": { type: "folder", order: ["Side Control Escape", "Mount Escape", "Back Escape", "Ride Escape", "Turtle Escape", "Dogfight"], children: {} }
            }},
            "Submissions": { type: "folder", order: ["Submissions (global)", "Submission Defense (global)"], children: {} }
        }},
        "Wrestling": { type: "folder", order: ["Underhook", "2-on-1", "Collar Tie", "Single Leg", "Double Leg", "50-50"], children: {
            "Underhook": { type: "folder", order: ["Underhook Attack", "Underhook Defense"], children: {
                "Underhook Attack": { type: "tech", status: "on_test", notes: {on_test:"",already:"",future:""}, videos:{on_test:[],already:[],future:[]} }
            }}
        }}
    };

    function initNode(obj) {
        Object.keys(obj).forEach(k => {
            if(!obj[k].type) obj[k].type = "folder";
            if(obj[k].type === "folder") {
                if(!obj[k].order) obj[k].order = [];
                if(!obj[k].children) obj[k].children = {};
                initNode(obj[k].children);
            } else if(obj[k].type === "tech") {
                if(!obj[k].notes) obj[k].notes = {on_test:"",already:"",future:""};
                if(!obj[k].videos) obj[k].videos = {on_test:[],already:[],future:[]};
                if(!obj[k].status) obj[k].status = "on_test";
            }
        });
    }
    initNode(tree);

    let db = JSON.parse(localStorage.getItem('jjb_v28_2')) || { journalier: [], data: { order: ["Grappling", "Wrestling"], children: tree } };
    let currentPath = [];
    let activeTech = null;

    function save() { localStorage.setItem('jjb_v28_2', JSON.stringify(db)); render(); }
    function goHome() { currentPath = []; render(); }
    function goBack() { currentPath.pop(); if(currentPath[currentPath.length-1]==='children') currentPath.pop(); render(); }
    function closeModal(id) { document.getElementById(id).style.display='none'; }

    function render() {
        const content = document.getElementById('app-content');
        content.innerHTML = "";
        const isHome = currentPath.length === 0;
        const isJournalier = currentPath[0] === 'journalier';
        
        document.getElementById('btn-back').style.visibility = isHome ? "hidden" : "visible";
        document.getElementById('path-display').innerText = isHome ? "ACCUEIL" : currentPath.filter(p=>p!=='children').join(" > ").toUpperCase();

        if(isHome) {
            content.innerHTML = `
                <div class="item-wrapper"><div class="item-main" onclick="currentPath=['journalier'];render()"><strong>Journalier</strong><span>〉</span></div></div>
                <div class="item-wrapper"><div class="item-main" onclick="currentPath=['data'];render()"><strong>Data</strong><span>〉</span></div></div>`;
            return;
        }

        if(!isJournalier) content.innerHTML += `<button class="btn-add" onclick="openAdd()">+ AJOUTER</button>`;

        let cur = db; currentPath.forEach(p => cur = cur[p]);
        const list = document.createElement('div');
        list.id = "sortable-list";
        content.appendChild(list);

        const items = isJournalier ? db.journalier : (cur.order || []);
        items.forEach(obj => {
            const name = isJournalier ? obj.name : obj;
            const path = isJournalier ? obj.path : currentPath;
            let target = db; path.forEach(p => target = target[p]);
            const item = target.children[name];
            if(item) {
                const wrap = document.createElement('div');
                const isFav = db.journalier.some(f => f.name === name);
                wrap.className = `item-wrapper ${item.status ? 'status-'+item.status : ''}`;
                wrap.innerHTML = `
                    <div class="item-actions">
                        <button class="action-btn" style="background:${isFav?'var(--danger)':'var(--accent)'}" onclick="toggleFav('${name}', ${JSON.stringify(path)})">${isFav?'🚫':'⭐'}</button>
                        <button class="action-btn" style="background:var(--edit)" onclick="openRename('${name}', ${JSON.stringify(path)})">✏️</button>
                        <button class="action-btn" style="background:var(--danger)" onclick="delItem('${name}', ${JSON.stringify(path)})">🗑️</button>
                    </div>
                    <div class="item-main" onclick="openNode('${name}', ${JSON.stringify(path)})">
                        <strong class="item-name">${name}</strong><span>〉</span>
                    </div>`;
                setupSwipe(wrap);
                list.appendChild(wrap);
            }
        });

        new Sortable(list, { 
            animation: 150, 
            onEnd: () => {
                const names = Array.from(list.querySelectorAll('.item-name')).map(el => el.innerText);
                if(isJournalier) db.journalier = names.map(n => db.journalier.find(f => f.name === n));
                else cur.order = names;
                localStorage.setItem('jjb_v28_2', JSON.stringify(db));
            }
        });
    }

    function setupSwipe(el) {
        let startX;
        el.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive:true});
        el.addEventListener('touchend', e => {
            let diff = startX - e.changedTouches[0].clientX;
            if(diff > 60) el.classList.add('swiped');
            else if(diff < -60) el.classList.remove('swiped');
        });
    }

    function openNode(name, path) {
        let t = db; path.forEach(p => t = t[p]);
        const node = t.children[name];
        if(node.type === 'folder') { currentPath = [...path, 'children', name]; render(); }
        else { openEditor(name, path); }
    }

    function toggleFav(n, path) {
        const idx = db.journalier.findIndex(f => f.name === n);
        if(idx > -1) db.journalier.splice(idx, 1);
        else db.journalier.push({name: n, path: [...path]});
        save();
    }

    function openAdd() {
        document.getElementById('modal-title').innerText = "Ajouter";
        document.getElementById('tech-opt').style.display = "block";
        document.getElementById('item-input').value = "";
        document.getElementById('item-modal').style.display = "flex";
        document.getElementById('modal-confirm').onclick = () => {
            const n = document.getElementById('item-input').value.trim();
            if(!n) return;
            let cur = db; currentPath.forEach(p => cur = cur[p]);
            cur.children[n] = document.getElementById('is-tech').checked ? 
                { type:"tech", status:"on_test", notes:{on_test:"",already:"",future:""}, videos:{on_test:[],already:[],future:[]} } : 
                { type:"folder", order:[], children:{} };
            cur.order.push(n);
            save(); closeModal('item-modal');
        };
    }

    function openRename(old, path) {
        document.getElementById('modal-title').innerText = "Renommer";
        document.getElementById('tech-opt').style.display = "none";
        document.getElementById('item-input').value = old;
        document.getElementById('item-modal').style.display = "flex";
        document.getElementById('modal-confirm').onclick = () => {
            const n = document.getElementById('item-input').value.trim();
            if(!n || n === old) return;
            let target = db; path.forEach(p => target = target[p]);
            target.children[n] = target.children[old];
            delete target.children[old];
            target.order = target.order.map(x => x === old ? n : x);
            db.journalier.forEach(f => { if(f.name === old) f.name = n; });
            save(); closeModal('item-modal');
        };
    }

    function delItem(n, path) {
        if(confirm(`Supprimer ${n} ?`)) {
            let target = db; path.forEach(p => target = target[p]);
            delete target.children[n];
            target.order = target.order.filter(x => x !== n);
            db.journalier = db.journalier.filter(f => f.name !== n);
            save();
        }
    }

    function openEditor(name, path) {
        let t = db; path.forEach(p => t = t[p]);
        activeTech = t.children[name];
        document.getElementById('editor-title').innerText = name;
        document.getElementById('note-editor').style.display = 'flex';
        switchTab(activeTech.status || 'on_test');
    }

    function switchTab(s) {
        activeTech.status = s;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+s).classList.add('active');
        document.getElementById('note-textarea').value = activeTech.notes[s] || "";
        document.getElementById('note-display').innerText = activeTech.notes[s] || "";
        renderVids();
    }

    function renderVids() {
        const container = document.getElementById('video-list');
        container.innerHTML = `<button style="width:100%; padding:15px; background:#111; color:#888; border:1px dashed #444; border-radius:10px; margin-bottom:10px;">➕ AJOUTER VIDÉO</button>`;
        (activeTech.videos[activeTech.status] || []).forEach((v, i) => {
            container.innerHTML += `<div style="background:#1c1c1e; border-radius:10px; margin-bottom:10px; overflow:hidden;">
                <iframe src="${v.url}" style="width:100%; height:180px; border:none;"></iframe>
                <div style="padding:10px; display:flex; justify-content:space-between;">
                    <span style="font-size:10px;">${v.type}</span>
                    <button onclick="delVid(${i})" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:5px;">MOINS (-)</button>
                </div>
            </div>`;
        });
    }

    function handleInput() {
        activeTech.notes[activeTech.status] = document.getElementById('note-textarea').value;
        document.getElementById('note-display').innerText = activeTech.notes[activeTech.status];
        localStorage.setItem('jjb_v28_2', JSON.stringify(db));
    }
    function syncScroll() { document.getElementById('note-display').scrollTop = document.getElementById('note-textarea').scrollTop; }
    function closeEditor() { document.getElementById('note-editor').style.display = 'none'; render(); }

    render();
</script>
</body>
</html>
