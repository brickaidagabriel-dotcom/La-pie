<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJB Vault</title>
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff; --accent: #0a84ff;
            --on-test: #ff9f0a; --future: #30d158; --already: #64d2ff;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui; margin: 0; padding-bottom: 90px; user-select: none; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid #333; }
        .container { padding: 15px; }
        .item { 
            background: var(--card); margin-bottom: 10px; padding: 16px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-on_test { border-left: 5px solid var(--on-test); }
        .status-future { border-left: 5px solid var(--future); }
        .status-already { border-left: 5px solid var(--already); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--card); display: flex; justify-content: center; align-items: center; border-top: 1px solid #333; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; margin-bottom: 20px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:var(--card); padding:20px; border-radius:15px; width:85%; }
        input, textarea, select { width:100%; background:#2c2c2e; border:1px solid #444; color:white; padding:12px; margin:10px 0; border-radius:8px; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div id="path-display" style="font-size:12px; color:var(--accent);">Accueil</div>
        <h2 id="view-title" style="margin:0">JJB Vault</h2>
    </div>
    <button onclick="downloadBackup()" style="background:none; border:none; font-size:20px;">⚙️</button>
</div>

<div id="app-content" class="container"></div>

<nav class="nav-bar">
    <button onclick="goHome()" style="background:none; border:none; font-size:30px;">🏠</button>
</nav>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="margin-top:0">Ajouter</h3>
        <input type="text" id="input-name" placeholder="Nom de la catégorie ou technique">
        <div id="tech-fields" style="display:none;">
            <select id="select-status">
                <option value="">Pas de tag</option>
                <option value="on_test">On Test (Orange)</option>
                <option value="future">Future Test (Vert)</option>
                <option value="already">Already Test (Turquoise)</option>
            </select>
            <textarea id="input-note" placeholder="Tes notes ici..." rows="4"></textarea>
        </div>
        <label style="display:block; margin:10px 0;"><input type="checkbox" id="is-final" onchange="document.getElementById('tech-fields').style.display = this.checked ? 'block' : 'none'"> C'est une technique (avec notes)</label>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="closeModal()" style="flex:1; padding:12px; background:#444; border:none; color:white; border-radius:8px;">Annuler</button>
            <button onclick="saveItem()" style="flex:1; padding:12px; background:var(--accent); border:none; color:white; border-radius:8px;">Sauver</button>
        </div>
    </div>
</div>

<script>
    // 1. CHARGEMENT / INITIALISATION FORCEE
    let db = JSON.parse(localStorage.getItem('jjb_vault_db')) || {
        journalier: [],
        data: {
            children: {
                "Grappling": { type: "folder", children: {} },
                "Wrestling": { type: "folder", children: {} }
            }
        }
    };
    let currentPath = [];

    function saveToDisk() { localStorage.setItem('jjb_vault_db', JSON.stringify(db)); }

    function goHome() { currentPath = []; render(); }

    function render() {
        const content = document.getElementById('app-content');
        const pathDisplay = document.getElementById('path-display');
        const title = document.getElementById('view-title');
        content.innerHTML = "";

        // ECRAN D'ACCUEIL
        if (currentPath.length === 0) {
            title.innerText = "JJB Vault";
            pathDisplay.innerText = "Accueil";
            content.innerHTML = `
                <div class="item" onclick="openJournalier()">📂 Journalier <span style="color:gray">></span></div>
                <div class="item" onclick="enterFolder(['data'])">📊 Data <span style="color:gray">></span></div>
            `;
            return;
        }

        // ECRAN JOURNALIER
        if (currentPath[0] === 'journalier') {
            title.innerText = "Journalier";
            pathDisplay.innerText = "Raccourcis";
            if(db.journalier.length === 0) content.innerHTML = "<p style='color:gray'>Aucun favori. Ajoute-en avec l'étoile ⭐</p>";
            db.journalier.forEach((fav, idx) => {
                let div = document.createElement('div');
                div.className = "item";
                div.innerHTML = `<span>${fav.name}</span> <button onclick="db.journalier.splice(${idx},1); saveToDisk(); render(); event.stopPropagation();" style="background:none; border:none; color:red">Retirer</button>`;
                div.onclick = () => { currentPath = [...fav.path]; render(); };
                content.appendChild(div);
            });
            return;
        }

        // NAVIGATION DANS DATA
        let current = db;
        currentPath.forEach(p => { current = current[p]; });
        
        title.innerText = currentPath[currentPath.length-1] === "children" ? currentPath[currentPath.length-2] : currentPath[currentPath.length-1];
        pathDisplay.innerText = "Data > " + currentPath.filter(p => p !== "children" && p !== "data").join(" > ");

        content.innerHTML = `<button class="btn-add" onclick="openModal()">+ Ajouter ici</button>`;

        const items = current.children || {};
        Object.keys(items).forEach(key => {
            const obj = items[key];
            const div = document.createElement('div');
            div.className = `item ${obj.status ? 'status-'+obj.status : ''}`;
            
            // Appui long pour supprimer
            let timer;
            div.ontouchstart = () => timer = setTimeout(() => { if(confirm("Supprimer "+key+" ?")) { delete items[key]; saveToDisk(); render(); } }, 800);
            div.ontouchend = () => clearTimeout(timer);

            div.innerHTML = `
                <div style="flex:1">
                    <strong>${key}</strong>
                    ${obj.type === 'tech' ? '<div style="font-size:12px; color:gray; margin-top:5px;">'+obj.note.substring(0,30)+'...</div>' : ''}
                </div>
                <button onclick="addFav('${key}'); event.stopPropagation();" style="background:none; border:none; font-size:20px;">⭐</button>
            `;
            div.onclick = () => {
                if(obj.type === 'folder') { currentPath.push('children', key); render(); }
                else { alert("Note :\n\n" + obj.note); }
            };
            content.appendChild(div);
        });
    }

    function enterFolder(path) { currentPath = path; render(); }
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveItem() {
        const name = document.getElementById('input-name').value.trim();
        const isTech = document.getElementById('is-final').checked;
        if(!name) return;

        let current = db;
        currentPath.forEach(p => { current = current[p]; });

        if(!current.children) current.children = {};
        current.children[name] = isTech ? {
            type: 'tech',
            status: document.getElementById('select-status').value,
            note: document.getElementById('input-note').value
        } : { type: 'folder', children: {} };

        saveToDisk();
        closeModal();
        document.getElementById('input-name').value = "";
        render();
    }

    function addFav(name) {
        if(!db.journalier.find(f => f.name === name)) {
            db.journalier.push({name: name, path: [...currentPath]});
            saveToDisk();
            alert("Ajouté au Journalier !");
        }
    }

    function downloadBackup() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href", dataStr);
        dlAnchorElem.setAttribute("download", "jjb_vault.json");
        dlAnchorElem.click();
    }

    render();
</script>
</body>
</html>
