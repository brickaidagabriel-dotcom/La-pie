<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJB Vault V15.1 - SWIPE FIXED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg: #000; --card: #1c1c1e; --text: #fff; --turquoise: #00f2ff; 
            --danger: #ff453a; --edit: #5e5ce6; --accent: #0a84ff;
            --on-test: #30d158; --already: #ff9f0a; --future: #00f2ff;
        }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid #333; position: sticky; top:0; z-index: 100; }
        .version-tag { position: absolute; top: 5px; left: 10px; font-size: 8px; color: var(--turquoise); font-weight: bold; }
        .nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; height: 30px; }
        .back-btn { color: var(--turquoise); font-weight: bold; font-size: 16px; background: none; border: none; padding: 0; cursor: pointer; }
        
        .container { padding: 15px; }
        .search-bar-wrap { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-input { flex: 1; background: #2c2c2e; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; -webkit-user-select: text; user-select: text; outline: none; }
        .search-go { background: var(--turquoise); border: none; border-radius: 10px; padding: 0 15px; font-weight: bold; color: #000; }

        .btn-add { background: var(--turquoise); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; font-size: 16px; }
        
        /* SWIPE SYSTEM FIXED */
        .item-wrapper { position: relative; margin-bottom: 12px; background: #333; border-radius: 12px; overflow: hidden; touch-action: pan-y; }
        .item-main { background: var(--card); padding: 22px 20px; position: relative; z-index: 10; display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); cursor: pointer; }
        .item-title-row { display: flex; justify-content: space-between; align-items: center; width: 100%; pointer-events: none; }
        
        .item-actions { position: absolute; right: 0; top: 0; height: 100%; display: flex; z-index: 1; }
        .action-btn { width: 65px; border: none; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .swiped .item-main { transform: translateX(-195px); }

        .status-on_test { border-left: 6px solid var(--on-test) !important; }
        .status-already { border-left: 6px solid var(--already) !important; }
        .status-future { border-left: 6px solid var(--future) !important; }

        /* EDITOR */
        #note-editor { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; flex-direction:column; }
        .tabs { display: flex; gap: 8px; padding: 12px; background: #111; }
        .tab { flex: 1; padding: 12px 5px; border-radius: 8px; font-size: 11px; font-weight: bold; text-align: center; opacity: 0.4; color: #000; }
        .tab.active { opacity: 1; border: 2px solid white; }
        
        .editor-body { flex: 1; position: relative; overflow: hidden; }
        #note-display { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; color: white; font-size: 17px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; pointer-events: none; z-index: 1; overflow-y: auto; }
        #note-textarea { width: 100%; height: 100%; background: transparent; border: none; color: transparent; caret-color: var(--turquoise); padding: 20px; font-size: 17px; line-height: 1.6; resize: none; outline: none; -webkit-user-select: text; user-select: text; z-index: 2; position: relative; }
        
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; justify-content:center; align-items:center; }
        .modal-content { background:var(--card); padding:25px; border-radius:20px; width:85%; border: 1px solid var(--turquoise); }

        nav { position:fixed; bottom:0; width:100%; height:75px; background:var(--card); display:flex; justify-content:center; align-items:center; border-top:1px solid #333; z-index:100; }
    </style>
</head>
<body>

<div id="main-view">
    <div class="header">
        <div class="version-tag">V15.1 - FIXED SWIPE</div>
        <div class="nav-top">
            <button id="btn-back" class="back-btn" onclick="goBack()" style="visibility: hidden;">〈 Retour</button>
            <span id="path-display" style="font-size:10px; color:var(--turquoise);">ACCUEIL</span>
        </div>
        <h2 id="view-title" style="margin:0; font-weight: 800;">JJB Vault</h2>
    </div>
    <div id="app-content" class="container"></div>
    <nav><button onclick="goHome()" style="background:none; border:none; font-size:32px;">🏠</button></nav>
</div>

<div id="note-editor">
    <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="closeEditor()" class="back-btn">〈 Retour</button>
        <h3 id="editor-title" style="margin:0; font-size:16px;">Note</h3>
        <div style="width:50px;"></div>
    </div>
    <div class="tabs">
        <div class="tab" id="tab-on_test" style="background:var(--on-test)" onclick="switchTab('on_test')">ON TEST</div>
        <div class="tab" id="tab-already" style="background:var(--already)" onclick="switchTab('already')">ALREADY</div>
        <div class="tab" id="tab-future" style="background:var(--future)" onclick="switchTab('future')">FUTURE</div>
    </div>
    <div class="editor-body">
        <div id="note-display"></div>
        <textarea id="note-textarea" spellcheck="false" oninput="handleInput()" onscroll="syncScroll()"></textarea>
    </div>
</div>

<div id="item-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="color:var(--turquoise); margin-top:0;">Nouveau</h3>
        <input type="text" id="item-name-input" class="search-input" style="width:100%; margin-bottom:15px;" placeholder="Nom...">
        <div id="tech-option" style="margin-bottom:20px;">
            <label style="color:#fff; display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="is-tech-check" style="width:20px; height:20px;"> Fenêtre Finale (Notes)
            </label>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal('item-modal')" style="flex:1; padding:12px; background:#444; color:#fff; border:none; border-radius:8px;">Annuler</button>
            <button id="modal-confirm-btn" style="flex:1; padding:12px; background:var(--turquoise); color:#000; border:none; border-radius:8px; font-weight:bold;">Valider</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('jjb_vault_v15_1')) || {
        journalier: [],
        data: {
            order: ["Grappling", "Wrestling"],
            children: {
                "Grappling": { type: "folder", order: [], children: {} },
                "Wrestling": { type: "folder", order: [], children: {} }
            }
        }
    };

    let currentPath = [];
    let activeTech = null;
    let searchQuery = "";
    let editingKey = null;

    function saveDB() { localStorage.setItem('jjb_vault_v15_1', JSON.stringify(db)); render(); }
    function goHome() { currentPath = []; searchQuery = ""; render(); }
    function goBack() { currentPath.pop(); if(currentPath[currentPath.length-1] === "children") currentPath.pop(); render(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function render() {
        const content = document.getElementById('app-content');
        content.innerHTML = "";
        const isHome = currentPath.length === 0;
        const isJournalier = currentPath[0] === 'journalier';
        
        document.getElementById('btn-back').style.visibility = isHome ? "hidden" : "visible";
        document.getElementById('path-display').innerText = isHome ? "ACCUEIL" : currentPath.filter(p=>p!=="children").join(" > ").toUpperCase();

        if(isHome) {
            document.getElementById('view-title').innerText = "JJB Vault";
            content.innerHTML = `
                <div class="item-wrapper"><div class="item-main" onclick="currentPath=['journalier'];render()"><div class="item-title-row"><strong>Journalier</strong><span>〉</span></div></div></div>
                <div class="item-wrapper"><div class="item-main" onclick="currentPath=['data'];render()"><div class="item-title-row"><strong>Data</strong><span>〉</span></div></div></div>`;
            return;
        }

        if(!isJournalier) {
            const sDiv = document.createElement('div');
            sDiv.className = "search-bar-wrap";
            sDiv.innerHTML = `<input type="text" id="search-input" class="search-input" placeholder="Rechercher..." value="${searchQuery}"><button class="search-go" onclick="execSearch()">OK</button>`;
            content.appendChild(sDiv);
            if(!searchQuery) content.innerHTML += `<button class="btn-add" onclick="openAddModal()">+ AJOUTER FENÊTRE</button>`;
        }

        if(searchQuery) { renderResults(content); return; }

        let current = db; currentPath.forEach(p => current = current[p]);
        document.getElementById('view-title').innerText = currentPath[currentPath.length-1];

        const list = document.createElement('div');
        list.id = "sortable-list";
        content.appendChild(list);

        const items = isJournalier ? db.journalier : (current.order || []);
        items.forEach(obj => {
            const key = isJournalier ? obj.name : obj;
            const path = isJournalier ? obj.path : currentPath;
            let target = db; path.forEach(p => target = target[p]);
            const item = target.children[key];
            if(!item) return;

            const wrap = createUI(key, () => {
                if(item.type === 'folder') { currentPath = [...path, 'children', key]; render(); }
                else { openEditor(key, path); }
            }, item.status);
            list.appendChild(wrap);
        });

        new Sortable(list, { animation: 150 });
    }

    function createUI(label, onclick, status) {
        const wrap = document.createElement('div');
        const isFav = db.journalier.some(f => f.name === label);
        wrap.className = `item-wrapper ${status ? 'status-'+status : ''}`;
        wrap.innerHTML = `
            <div class="item-actions">
                <button class="action-btn" style="background:${isFav?'var(--danger)':'var(--accent)'}" onclick="toggleFav('${label}')">${isFav?'🚫':'⭐'}</button>
                <button class="action-btn" style="background:var(--edit)" onclick="openEditModal('${label}')">✏️</button>
                <button class="action-btn" style="background:var(--danger)" onclick="deleteItem('${label}')">🗑️</button>
            </div>
            <div class="item-main">
                <div class="item-title-row"><strong>${label}</strong><span>〉</span></div>
            </div>`;
        wrap.querySelector('.item-main').onclick = onclick;
        setupSwipe(wrap);
        return wrap;
    }

    function setupSwipe(el) {
        let startX;
        el.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive:true});
        el.addEventListener('touchend', e => {
            let diff = startX - e.changedTouches[0].clientX;
            if(diff > 60) el.classList.add('swiped');
            else if(diff < -60) el.classList.remove('swiped');
        });
    }

    function execSearch() { searchQuery = document.getElementById('search-input').value.trim().toLowerCase(); render(); }

    function renderResults(container) {
        function scan(obj, path) {
            Object.keys(obj.children || {}).forEach(k => {
                const it = obj.children[k];
                if(k.toLowerCase().includes(searchQuery)) {
                    container.appendChild(createUI(k, () => {
                        searchQuery = "";
                        if(it.type === 'folder') { currentPath = [...path, 'children', k]; render(); }
                        else { openEditor(k, path); }
                    }, it.status));
                }
                scan(it, [...path, k, 'children']);
            });
        }
        scan(db.data, ['data', 'children']);
    }

    // GESTION MODALS (AJOUT / MODIFIER)
    function openAddModal() {
        editingKey = null;
        document.getElementById('modal-title').innerText = "Nouvelle Fenêtre";
        document.getElementById('item-name-input').value = "";
        document.getElementById('tech-option').style.display = "block";
        document.getElementById('item-modal').style.display = "flex";
        document.getElementById('modal-confirm-btn').onclick = addItem;
    }

    function openEditModal(key) {
        editingKey = key;
        document.getElementById('modal-title').innerText = "Renommer";
        document.getElementById('item-name-input').value = key;
        document.getElementById('tech-option').style.display = "none";
        document.getElementById('item-modal').style.display = "flex";
        document.getElementById('modal-confirm-btn').onclick = editItem;
    }

    function addItem() {
        const name = document.getElementById('item-name-input').value.trim();
        if(!name) return;
        const isTech = document.getElementById('is-tech-check').checked;
        let t = db; currentPath.forEach(p => t = t[p]);
        t.children[name] = isTech ? { type:"tech", status:"on_test", notes:{on_test:"",already:"",future:""} } : { type:"folder", order:[], children:{} };
        t.order.push(name);
        saveDB(); closeModal('item-modal');
    }

    function editItem() {
        const newName = document.getElementById('item-name-input').value.trim();
        if(!newName || newName === editingKey) return;
        let t = db; currentPath.forEach(p => t = t[p]);
        t.children[newName] = t.children[editingKey];
        delete t.children[editingKey];
        t.order = t.order.map(n => n === editingKey ? newName : n);
        db.journalier.forEach(f => { if(f.name === editingKey) f.name = newName; });
        saveDB(); closeModal('item-modal');
    }

    function deleteItem(id) {
        if(confirm(`Supprimer définitivement "${id}" ?`)) {
            let t = db; currentPath.forEach(p => t = t[p]);
            delete t.children[id];
            t.order = t.order.filter(x => x !== id);
            db.journalier = db.journalier.filter(f => f.name !== id);
            saveDB();
        }
    }

    function toggleFav(id) {
        const idx = db.journalier.findIndex(f => f.name === id);
        if(idx > -1) db.journalier.splice(idx, 1);
        else db.journalier.push({name: id, path: [...currentPath]});
        saveDB();
    }

    function openEditor(key, path) {
        let t = db; path.forEach(p => t = t[p]);
        activeTech = t.children[key];
        document.getElementById('editor-title').innerText = key;
        document.getElementById('note-editor').style.display = 'flex';
        switchTab(activeTech.status || 'on_test');
    }

    function switchTab(s) {
        activeTech.status = s;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+s).classList.add('active');
        document.getElementById('note-textarea').value = activeTech.notes[s] || "";
        document.getElementById('note-display').innerText = activeTech.notes[s] || "";
    }

    function handleInput() {
        activeTech.notes[activeTech.status] = document.getElementById('note-textarea').value;
        document.getElementById('note-display').innerText = activeTech.notes[activeTech.status];
        localStorage.setItem('jjb_vault_v15_1', JSON.stringify(db));
    }

    function syncScroll() { document.getElementById('note-display').scrollTop = document.getElementById('note-textarea').scrollTop; }
    function closeEditor() { document.getElementById('note-editor').style.display = 'none'; render(); }

    render();
</script>
</body>
</html>
