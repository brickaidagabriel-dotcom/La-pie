<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJB Vault V26.0.0 - FULL VERSION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg: #000; --card: #1c1c1e; --text: #fff; --turquoise: #00f2ff; 
            --danger: #ff453a; --edit: #5e5ce6; --accent: #0a84ff;
            --on-test: #30d158; --already: #ff9f0a; --future: #00f2ff;
        }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* HEADER RÉSISTANT */
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid #333; position: sticky; top:0; z-index: 100; }
        .version-tag { position: absolute; top: 5px; left: 10px; font-size: 8px; color: #555; font-weight: bold; }
        .nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; height: 30px; }
        .back-btn { color: var(--turquoise); font-weight: bold; font-size: 16px; background: none; border: none; padding: 0; cursor: pointer; }
        
        /* RECHERCHE & AJOUT */
        .search-bar-wrap { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-input { flex: 1; background: #2c2c2e; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; -webkit-user-select: text; user-select: text; outline: none; }
        .search-go { background: var(--turquoise); border: none; border-radius: 10px; padding: 0 15px; font-weight: bold; color: #000; }
        .container { padding: 15px; }
        .btn-add { background: var(--turquoise); color: #000; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: bold; margin-bottom: 25px; font-size: 16px; box-shadow: 0 4px 20px rgba(0,242,255,0.15); }
        
        /* ITEMS & GESTION SWIPE */
        .item-wrapper { position: relative; margin-bottom: 12px; background: #333; border-radius: 14px; overflow: hidden; touch-action: pan-y; }
        .item-main { background: var(--card); padding: 24px 20px; position: relative; z-index: 10; display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .item-title-row { display: flex; justify-content: space-between; align-items: center; width: 100%; pointer-events: none; }
        .item-snippet { font-size: 11px; color: #888; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
        .item-actions { position: absolute; right: 0; top: 0; height: 100%; display: flex; z-index: 1; }
        .action-btn { width: 65px; border: none; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .swiped .item-main { transform: translateX(-195px); }

        /* CODES COULEURS STATUTS */
        .status-on_test { border-left: 6px solid var(--on-test) !important; }
        .status-already { border-left: 6px solid var(--already) !important; }
        .status-future { border-left: 6px solid var(--future) !important; }

        /* ÉDITEUR SPLIT-SCREEN COMPLET */
        #note-editor { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; flex-direction:column; }
        .editor-split-container { display: flex; flex-direction: column; height: 100%; }
        .tabs { display: flex; gap: 8px; padding: 12px; background: #111; }
        .tab { flex: 1; padding: 12px 5px; border-radius: 8px; font-size: 11px; font-weight: bold; text-align: center; opacity: 0.4; color: #000; transition: 0.2s; }
        .tab.active { opacity: 1; border: 2px solid white; transform: scale(1.05); }
        
        .text-pane { flex: 1; position: relative; border-bottom: 2px solid #333; overflow: hidden; background: #000; }
        #note-display { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; color: white; font-size: 17px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; pointer-events: none; z-index: 1; overflow-y: auto; }
        #note-textarea { width: 100%; height: 100%; background: transparent; border: none; color: transparent; caret-color: var(--turquoise); padding: 20px; font-size: 17px; line-height: 1.6; resize: none; outline: none; -webkit-user-select: text; user-select: text; z-index: 2; position: relative; }
        
        /* VIDÉO & SUPPRESSION */
        .video-pane { flex: 1; background: #0a0a0a; overflow-y: auto; padding: 10px; border-top: 2px solid #222; }
        .video-wrapper-inner { position: relative; margin-bottom: 15px; background: var(--danger); border-radius: 12px; overflow: hidden; }
        .video-card { background: #1c1c1e; position: relative; z-index: 10; transition: transform 0.3s ease; }
        .video-card iframe { width: 100%; height: 215px; border: none; }
        .video-meta { padding: 12px; font-size: 13px; color: var(--turquoise); display: flex; justify-content: space-between; align-items: center; }
        .swiped-video { transform: translateX(-80px); }
        .del-vid-btn { position: absolute; right: 0; top: 0; width: 80px; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        /* TIME PICKER ROULETTES */
        .time-picker { display: flex; justify-content: center; align-items: center; gap: 8px; background: #2c2c2e; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .time-picker select { background: #1c1c1e; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 16px; outline: none; -webkit-appearance: none; appearance: none; text-align: center; width: 70px; }

        /* MODALS GÉNÉRAUX */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:3000; justify-content:center; align-items:center; }
        .modal-content { background:var(--card); padding:30px; border-radius:24px; width:90%; border: 1px solid var(--turquoise); box-shadow: 0 0 30px rgba(0,242,255,0.2); }
    </style>
</head>
<body>

<div id="main-view">
    <div class="header">
        <div class="version-tag">V26.0.0 FULL CODE</div>
        <div class="nav-top">
            <button id="btn-back" class="back-btn" onclick="goBack()" style="visibility: hidden;">〈 Retour</button>
            <span id="path-display" style="font-size:10px; color:var(--turquoise); letter-spacing:1px;">ACCUEIL</span>
        </div>
        <h2 id="view-title" style="margin:0; font-weight: 800;">JJB Vault</h2>
    </div>
    <div id="app-content" class="container"></div>
    <nav style="position:fixed; bottom:0; width:100%; height:80px; background:var(--card); display:flex; justify-content:center; align-items:center; border-top:1px solid #333; z-index:100;">
        <button onclick="goHome()" style="background:none; border:none; font-size:35px;">🏠</button>
    </nav>
</div>

<div id="note-editor">
    <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
        <div class="version-tag">EDITOR V26</div>
        <button onclick="closeEditor()" class="back-btn">〈 Retour</button>
        <h3 id="editor-title" style="margin:0; font-size:16px; color:var(--turquoise);">Note</h3>
        <div style="width:50px;"></div>
    </div>
    <div class="editor-split-container">
        <div class="tabs">
            <div class="tab" id="tab-on_test" style="background:var(--on-test)" onclick="switchTab('on_test')">ON TEST</div>
            <div class="tab" id="tab-already" style="background:var(--already)" onclick="switchTab('already')">ALREADY</div>
            <div class="tab" id="tab-future" style="background:var(--future)" onclick="switchTab('future')">FUTURE</div>
        </div>
        <div class="text-pane">
            <div id="note-display"></div>
            <textarea id="note-textarea" spellcheck="false" oninput="handleInput()" onscroll="syncScroll()"></textarea>
        </div>
        <div class="video-pane" id="video-pane-list"></div>
    </div>
</div>

<div id="item-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="color:var(--turquoise); margin-top:0;">Nouvelle Fenêtre</h3>
        <input type="text" id="input-name" class="search-input" style="width:100%; margin-bottom:20px; font-size: 16px;" placeholder="Nom de la position/tech">
        <div id="tech-option-wrap" style="margin-bottom:25px;">
            <label style="color:#fff; display:flex; align-items:center; gap:12px; font-size:15px; cursor:pointer;">
                <input type="checkbox" id="is-tech" style="width:24px; height:24px;"> C'est une Technique Finale
            </label>
            <p style="font-size:11px; color:#777; margin: 8px 0 0 36px; line-height:1.3;">(Si coché : vous pourrez ajouter des notes et des vidéos à l'intérieur)</p>
        </div>
        <div style="display:flex; gap:12px;">
            <button onclick="closeModal('item-modal')" style="flex:1; padding:16px; background:#333; color:#fff; border-radius:12px; border:none; font-weight:bold;">Annuler</button>
            <button id="btn-save-item" style="flex:1; padding:16px; background:var(--turquoise); color:#000; border-radius:12px; border:none; font-weight:bold;">Enregistrer</button>
        </div>
    </div>
</div>

<div id="video-modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--turquoise); margin:0 0 15px 0;">Ajouter Ressource Vidéo</h3>
        <input type="text" id="vid-url" class="search-input" style="width:100%;" placeholder="Lien YouTube ou Short">
        <p style="font-size:12px; color:#aaa; margin:20px 0 5px 0; font-weight:bold;">⏱️ DÉBUT À :</p>
        <div class="time-picker">
            <select id="p-h"><option value="0">00h</option><option value="1">01h</option><option value="2">02h</option></select>
            <select id="p-m"></select>
            <select id="p-s"></select>
        </div>
        <div style="display:flex; gap:12px; margin-top:25px;">
            <button onclick="closeModal('video-modal')" style="flex:1; padding:15px; background:#333; color:#fff; border-radius:12px; border:none;">Annuler</button>
            <button onclick="addVideo()" style="flex:1; padding:15px; background:var(--turquoise); color:#000; border-radius:12px; border:none; font-weight:bold;">Valider</button>
        </div>
    </div>
</div>

<script>
    // INITIALISATION DU TIME PICKER
    const mSelect = document.getElementById('p-m'); 
    const sSelect = document.getElementById('p-s');
    for(let i=0; i<60; i++){
        let val = i < 10 ? '0'+i : i;
        mSelect.innerHTML += `<option value="${i}">${val}m</option>`;
        sSelect.innerHTML += `<option value="${i}">${val}s</option>`;
    }

    // BASE DE DONNÉES ET ARBORESCENCE PAR DÉFAUT
    const defaultData = {
        journalier: [],
        data: {
            order: ["Grappling", "Wrestling"],
            children: {
                "Grappling": { type: "folder", order: ["Top", "Bottom", "Submissions"], children: {
                    "Top": { type: "folder", order: ["Pin", "Passing"], children: {
                        "Pin": { type: "folder", order: ["Mount", "Side Control"], children: { "Mount": {type:"folder", order:[], children:{}}, "Side Control": {type:"folder", order:[], children:{}} }},
                        "Passing": { type: "folder", order: ["Half Guard Pass"], children: { "Half Guard Pass": { type: "folder", order: ["Knee Shield"], children: { "Knee Shield": { type: "folder", order: ["Medium Knee Shield"], children: { "Medium Knee Shield": { type: "folder", order: ["Underhook Attack"], children: { "Underhook Attack": { type: "tech", status: "on_test", notes: { on_test: "Détails ici...", already: "", future: "" }, videos: { on_test: [], already: [], future: [] } } } } } } } } }
                    }}
                }},
                "Wrestling": { type: "folder", order: [], children: {} }
            }
        }
    };

    let db = JSON.parse(localStorage.getItem('jjb_vault_v26')) || defaultData;
    let currentPath = [];
    let activeTech = null;
    let searchQuery = "";
    let editingItem = null;

    function saveDB() { localStorage.setItem('jjb_vault_v26', JSON.stringify(db)); render(); }
    function goHome() { currentPath = []; searchQuery = ""; render(); }
    function goBack() { currentPath.pop(); if(currentPath[currentPath.length-1] === "children") currentPath.pop(); render(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // RENDU PRINCIPAL
    function render() {
        const content = document.getElementById('app-content');
        content.innerHTML = "";
        const isHome = currentPath.length === 0;
        const isJournalier = currentPath[0] === 'journalier';
        
        document.getElementById('btn-back').style.visibility = isHome ? "hidden" : "visible";
        document.getElementById('path-display').innerText = isHome ? "ACCUEIL" : currentPath.filter(p => p !== "children").join(" > ").toUpperCase();

        if (isHome) {
            document.getElementById('view-title').innerText = "JJB Vault";
            content.innerHTML = `
                <div class="item-wrapper"><div class="item-main" onclick="currentPath=['journalier'];render()"><div class="item-title-row"><strong>Journalier</strong><span>〉</span></div></div></div>
                <div class="item-wrapper"><div class="item-main" onclick="currentPath=['data'];render()"><div class="item-title-row"><strong>Data</strong><span>〉</span></div></div></div>`;
            return;
        }

        if (!isJournalier) {
            const sWrap = document.createElement('div');
            sWrap.className = "search-bar-wrap";
            sWrap.innerHTML = `<input type="text" id="search-input" class="search-input" placeholder="Titre ou contenu..." value="${searchQuery}" onkeydown="if(event.key==='Enter') execSearch()"><button class="search-go" onclick="execSearch()">OK</button>`;
            content.appendChild(sWrap);
            if(!searchQuery) content.innerHTML += `<button class="btn-add" onclick="openAddModal()">+ AJOUTER FENÊTRE</button>`;
        }

        if (searchQuery) { renderSearchResults(content); return; }

        let current = db; currentPath.forEach(p => current = current[p]);
        document.getElementById('view-title').innerText = isJournalier ? "Journalier" : currentPath[currentPath.length-1];
        
        const listContainer = document.createElement('div');
        listContainer.id = "sortable-list";
        content.appendChild(listContainer);

        const itemsToRender = isJournalier ? db.journalier : (current.order || []);
        itemsToRender.forEach((obj) => {
            const key = isJournalier ? obj.name : obj;
            let target = db; 
            const pathForThis = isJournalier ? obj.path : currentPath;
            pathForThis.forEach(p => target = target[p]);
            const item = target.children[key];
            if(!item) return;

            const wrap = createItemUI(key, key, () => {
                if(item.type === 'folder') { currentPath = [...pathForThis, 'children', key]; render(); }
                else { openEditor(key, pathForThis); }
            }, isJournalier, item.status);
            listContainer.appendChild(wrap);
        });

        new Sortable(listContainer, { animation: 150, delay: 400 });
    }

    function createItemUI(id, label, onclick, isJournalier, status, snippet) {
        const wrap = document.createElement('div');
        const isFav = db.journalier.some(f => f.name === id);
        wrap.className = `item-wrapper ${status ? 'status-'+status : ''}`;
        wrap.innerHTML = `
            <div class="item-actions">
                <button class="action-btn" style="background:${isFav?'var(--danger)':'var(--accent)'}" onclick="toggleFav('${id}')">${isFav?'🚫':'⭐'}</button>
                <button class="action-btn" style="background:var(--edit)" onclick="openRenameModal('${id}')">✏️</button>
                <button class="action-btn" style="background:var(--danger)" onclick="deleteItem('${id}')">🗑️</button>
            </div>
            <div class="item-main">
                <div class="item-title-row"><strong>${label}</strong><span>〉</span></div>
                ${snippet ? `<div class="item-snippet">${snippet}</div>` : ''}
            </div>`;
        wrap.querySelector('.item-main').onclick = onclick;
        setupSwipeEffect(wrap);
        return wrap;
    }

    function setupSwipeEffect(el) {
        let startX;
        el.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});
        el.addEventListener('touchend', e => {
            let diff = startX - e.changedTouches[0].clientX;
            if(diff > 65) el.classList.add('swiped');
            else if(diff < -65) el.classList.remove('swiped');
        });
    }

    function execSearch() { searchQuery = document.getElementById('search-input').value.trim().toLowerCase(); render(); }

    function renderSearchResults(container) {
        const results = [];
        function scan(obj, path) {
            if(obj.children) {
                Object.keys(obj.children).forEach(key => {
                    const item = obj.children[key];
                    let match = key.toLowerCase().includes(searchQuery);
                    let snippet = "";
                    if(!match && item.notes) {
                        for(let s in item.notes) {
                            if(item.notes[s].toLowerCase().includes(searchQuery)) {
                                match = true;
                                snippet = item.notes[s].substring(0, 45).replace(/\n/g, " ") + "...";
                                break;
                            }
                        }
                    }
                    if(match) results.push({name: key, path: [...path], item: item, snippet: snippet});
                    scan(item, [...path, key, 'children']);
                });
            }
        }
        scan(db.data, ['data', 'children']);
        results.forEach(res => {
            const wrap = createItemUI(res.name, res.name, () => {
                searchQuery = "";
                if(res.item.type === 'folder') { currentPath = [...res.path, res.name]; render(); }
                else { openEditor(res.name, res.path); }
            }, false, res.item.status, res.snippet);
            container.appendChild(wrap);
        });
    }

    // GESTION DES FENÊTRES (AJOUT/REMODIF)
    function openAddModal() {
        editingItem = null;
        document.getElementById('modal-title').innerText = "Nouvelle Fenêtre";
        document.getElementById('input-name').value = "";
        document.getElementById('is-tech').checked = false;
        document.getElementById('tech-option-wrap').style.display = "block";
        document.getElementById('item-modal').style.display = 'flex';
        document.getElementById('btn-save-item').onclick = createNewItem;
    }

    function openRenameModal(id) {
        editingItem = id;
        document.getElementById('modal-title').innerText = "Renommer l'élément";
        document.getElementById('input-name').value = id;
        document.getElementById('tech-option-wrap').style.display = "none";
        document.getElementById('item-modal').style.display = 'flex';
        document.getElementById('btn-save-item').onclick = applyRename;
    }

    function createNewItem() {
        const n = document.getElementById('input-name').value.trim();
        if(!n) return;
        let t = db; currentPath.forEach(p => t = t[p]);
        const isFinal = document.getElementById('is-tech').checked;
        t.children[n] = isFinal ? { type:'tech', status:'on_test', notes:{on_test:"",already:"",future:""}, videos:{on_test:[],already:[],future:[]} } : { type:'folder', order:[], children:{} };
        t.order.push(n);
        saveDB(); closeModal('item-modal');
    }

    function applyRename() {
        const n = document.getElementById('input-name').value.trim();
        if(!n || n === editingItem) return;
        let t = db; currentPath.forEach(p => t = t[p]);
        t.children[n] = t.children[editingItem];
        delete t.children[editingItem];
        t.order = t.order.map(x => x === editingItem ? n : x);
        saveDB(); closeModal('item-modal');
    }

    function deleteItem(id) {
        if(confirm(`Voulez-vous vraiment supprimer "${id}" ?`)) {
            let t = db; currentPath.forEach(p => t = t[p]);
            delete t.children[id];
            t.order = t.order.filter(x => x !== id);
            db.journalier = db.journalier.filter(f => f.name !== id);
            saveDB();
        }
    }

    function toggleFav(id) {
        const idx = db.journalier.findIndex(f => f.name === id);
        if(idx > -1) db.journalier.splice(idx, 1);
        else db.journalier.push({name: id, path: [...currentPath]});
        saveDB();
    }

    // ÉDITEUR & VIDÉOS
    function openEditor(key, path) {
        let t = db; path.forEach(p => t = t[p]);
        activeTech = t.children[key];
        document.getElementById('editor-title').innerText = key;
        document.getElementById('note-editor').style.display = 'flex';
        switchTab(activeTech.status || 'on_test');
    }

    function switchTab(s) {
        activeTech.status = s;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + s).classList.add('active');
        document.getElementById('note-textarea').value = activeTech.notes[s] || "";
        document.getElementById('note-display').innerText = activeTech.notes[s] || "";
        renderVideosInEditor();
    }

    function renderVideosInEditor() {
        const container = document.getElementById('video-pane-list');
        container.innerHTML = `<div style="border:2px dashed #444; border-radius:14px; padding:22px; text-align:center; color:#888; margin-bottom:15px; font-weight:bold;" onclick="document.getElementById('video-modal').style.display='flex'">➕ AJOUTER VIDÉO / SHORT</div>`;
        const vids = activeTech.videos[activeTech.status] || [];
        vids.forEach((v, idx) => {
            const vWrap = document.createElement('div');
            vWrap.className = "video-wrapper-inner";
            vWrap.innerHTML = `
                <div class="del-vid-btn" onclick="deleteVideoFromTech(${idx})">EFFACER</div>
                <div class="video-card">
                    <iframe src="${v.embedUrl}" allowfullscreen></iframe>
                    <div class="video-meta"><strong>${v.label}</strong><span>⬅️ Glisser</span></div>
                </div>`;
            setupVideoSwipe(vWrap);
            container.appendChild(vWrap);
        });
    }

    function setupVideoSwipe(el) {
        let startX; const card = el.querySelector('.video-card');
        el.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});
        el.addEventListener('touchend', e => {
            let d = startX - e.changedTouches[0].clientX;
            if(d > 50) card.classList.add('swiped-video');
            else if(d < -50) card.classList.remove('swiped-video');
        });
    }

    function addVideo() {
        const url = document.getElementById('vid-url').value.trim();
        if(!url) return;
        const totalSec = (parseInt(document.getElementById('p-h').value)*3600) + (parseInt(document.getElementById('p-m').value)*60) + parseInt(document.getElementById('p-s').value);
        let id = "", embed = "", lab = "Vidéo";

        if(url.includes("shorts/")) {
            id = url.split("shorts/")[1].split(/[?&]/)[0];
            embed = `https://www.youtube.com/embed/${id}`; lab = "YouTube Short";
        } else if(url.includes("v=") || url.includes("youtu.be/")) {
            id = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("be/")[1].split(/[?&]/)[0];
            embed = `https://www.youtube.com/embed/${id}?start=${totalSec}`;
            lab = totalSec > 0 ? `Vidéo @ ${totalSec}s` : "Vidéo YouTube";
        }
        activeTech.videos[activeTech.status].push({ embedUrl: embed, label: lab });
        saveDB(); renderVideosInEditor(); closeModal('video-modal');
    }

    function deleteVideoFromTech(i) {
        activeTech.videos[activeTech.status].splice(i, 1);
        saveDB(); renderVideosInEditor();
    }

    function handleInput() {
        activeTech.notes[activeTech.status] = document.getElementById('note-textarea').value;
        document.getElementById('note-display').innerText = activeTech.notes[activeTech.status];
        localStorage.setItem('jjb_vault_v26', JSON.stringify(db));
    }

    function syncScroll() { document.getElementById('note-display').scrollTop = document.getElementById('note-textarea').scrollTop; }
    function closeEditor() { document.getElementById('note-editor').style.display = 'none'; render(); }

    render();
</script>
</body>
</html>
