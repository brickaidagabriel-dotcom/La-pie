<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJB Vault TURQUOISE</title>
    <style>
        :root { 
            --bg: #000; --card: #1c1c1e; --text: #fff; 
            --turquoise: #00f2ff; /* TA NOUVELLE COULEUR */
            --danger: #ff453a; 
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid #333; }
        .container { padding: 15px; }
        
        /* LE BOUTON TURQUOISE */
        .btn-add { 
            background: var(--turquoise); color: #000; border: none; padding: 15px; 
            border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; 
            font-size: 16px; text-transform: uppercase;
        }
        
        .item-wrapper { position: relative; margin-bottom: 10px; background: #333; border-radius: 12px; overflow: hidden; }
        .item-main { background: var(--card); padding: 18px; position: relative; z-index: 2; display: flex; justify-content: space-between; transition: transform 0.3s; }
        .item-actions { position: absolute; right: 0; top: 0; height: 100%; display: flex; transform: translateX(100%); transition: transform 0.3s; }
        .action-btn { width: 70px; border: none; color: #fff; font-size: 18px; }
        
        .swiped .item-main { transform: translateX(-140px); }
        .swiped.triple .item-main { transform: translateX(-210px); }
        .swiped .item-actions { transform: translateX(0); }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:var(--card); padding:20px; border-radius:15px; width:85%; border: 1px solid var(--turquoise); }
        input, textarea, select { width:100%; background:#2c2c2e; border:1px solid #444; color:#fff; padding:12px; margin:10px 0; border-radius:8px; font-size: 16px; }
    </style>
</head>
<body>

<div class="header">
    <div id="path-display" style="font-size:10px; color:var(--turquoise);">MODE TURQUOISE ACTIVE</div>
    <h2 id="view-title" style="margin:0">JJB Vault</h2>
</div>

<div id="app-content" class="container"></div>

<nav style="position:fixed; bottom:0; width:100%; height:70px; background:var(--card); display:flex; justify-content:center; align-items:center; border-top:1px solid #333; z-index:100;">
    <button onclick="goHome()" style="background:none; border:none; font-size:30px; color:white;">🏠</button>
</nav>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--turquoise)">Nouveau</h3>
        <input type="text" id="input-name" placeholder="Nom">
        <div id="tech-fields" style="display:none;">
            <select id="select-status">
                <option value="on_test">🟡 ON TEST</option>
                <option value="future">🟢 FUTURE TEST</option>
            </select>
            <textarea id="input-note" placeholder="Notes..."></textarea>
        </div>
        <label style="display:block; margin:10px 0;"><input type="checkbox" id="is-final" onchange="document.getElementById('tech-fields').style.display=this.checked?'block':'none'"> Technique finale</label>
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:10px; background:#444; color:#fff; border-radius:8px;">Annuler</button>
            <button onclick="saveItem()" style="flex:1; padding:10px; background:var(--turquoise); color:#000; border-radius:8px; font-weight:bold;">Sauver</button>
        </div>
    </div>
</div>

<script>
    // Utilisation d'une nouvelle clé de base de données pour forcer le nettoyage
    let db = JSON.parse(localStorage.getItem('jjb_vault_v4')) || {
        journalier: [],
        data: { order: ["Grappling", "Wrestling"], children: { 
            "Grappling": { type: "folder", children: {}, order: [] }, 
            "Wrestling": { type: "folder", children: {}, order: [] } 
        } }
    };
    let currentPath = [];

    function save() { localStorage.setItem('jjb_vault_v4', JSON.stringify(db)); render(); }
    function goHome() { currentPath = []; render(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function render() {
        const content = document.getElementById('app-content');
        content.innerHTML = "";
        
        if (currentPath.length === 0) {
            content.innerHTML = `
                <div class="item-wrapper"><div class="item-main" onclick="currentPath=['journalier'];render()">📂 Journalier</div></div>
                <div class="item-wrapper"><div class="item-main" onclick="currentPath=['data'];render()">📊 Data</div></div>`;
            return;
        }

        let current = db;
        currentPath.forEach(p => current = current[p]);

        content.innerHTML = `<button class="btn-add" onclick="document.getElementById('modal').style.display='flex'">+ Ajouter</button><div id="list"></div>`;
        const listContainer = document.getElementById('list');

        const order = current.order || Object.keys(current.children || {});

        order.forEach((key, index) => {
            const item = currentPath[0] === 'journalier' ? db.journalier[index] : current.children[key];
            if(!item) return;

            const wrap = document.createElement('div');
            wrap.className = "item-wrapper";
            if(currentPath[0] === 'data') wrap.classList.add('triple');
            
            wrap.innerHTML = `
                <div class="item-actions">
                    ${currentPath[0]==='data' ? `<button class="action-btn" style="background:#0a84ff" onclick="addFav('${key}')">⭐</button>` : ''}
                    <button class="action-btn" style="background:#ff453a" onclick="deleteItem('${key}', ${index})">🗑️</button>
                </div>
                <div class="item-main"><strong>${key || item.name}</strong><span>〉</span></div>`;

            // Swipe
            let startX;
            wrap.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            wrap.addEventListener('touchend', e => {
                let diff = startX - e.changedTouches[0].clientX;
                if(diff > 50) wrap.classList.add('swiped');
                else if(diff < -50) wrap.classList.remove('swiped');
            });

            wrap.querySelector('.item-main').onclick = () => {
                if(currentPath[0] === 'journalier') { currentPath = [...item.path]; render(); }
                else if(item.type === 'folder') { currentPath.push('children', key); render(); }
                else alert(item.note || "Pas de note");
            };
            listContainer.appendChild(wrap);
        });
    }

    function saveItem() {
        const nameInput = document.getElementById('input-name');
        const name = nameInput.value.trim();
        const isTech = document.getElementById('is-final').checked;
        if(!name) return;

        let current = db;
        currentPath.forEach(p => current = current[p]);
        
        if(!current.children) current.children = {};
        if(!current.order) current.order = [];

        current.children[name] = isTech ? { 
            type: 'tech', 
            note: document.getElementById('input-note').value 
        } : { type: 'folder', children: {}, order: [] };
        
        if(!current.order.includes(name)) current.order.push(name);

        nameInput.value = "";
        document.getElementById('input-note').value = "";
        save(); closeModal();
    }

    function deleteItem(key, index) {
        if(!confirm("Supprimer ?")) return;
        let current = db;
        currentPath.forEach(p => current = current[p]);
        if(currentPath[0] === 'journalier') {
            db.journalier.splice(index, 1);
        } else {
            delete current.children[key];
            current.order = current.order.filter(k => k !== key);
        }
        save();
    }

    function addFav(key) {
        db.journalier.push({name: key, path: [...currentPath]});
        save(); alert("Ajouté !");
    }

    render();
</script>
</body>
</html>
