<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJB Vault V19 - Back to Basics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg: #000; --card: #1c1c1e; --text: #fff; --turquoise: #00f2ff; 
            --danger: #ff453a; --edit: #5e5ce6; --accent: #0a84ff;
            --on-test: #30d158; --already: #ff9f0a; --future: #00f2ff;
        }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; height: 100vh; }
        
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid #333; position: sticky; top:0; z-index: 100; }
        .nav-top { display: flex; align-items: center; justify-content: space-between; height: 30px; }
        .back-btn { color: var(--turquoise); font-weight: bold; font-size: 16px; background: none; border: none; cursor: pointer; }
        
        .search-bar-wrap { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-input { flex: 1; background: #2c2c2e; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; -webkit-user-select: text; user-select: text; outline: none; }
        .search-go { background: var(--turquoise); border: none; border-radius: 10px; padding: 0 15px; font-weight: bold; color: #000; }

        .container { padding: 15px; overflow-y: auto; height: calc(100vh - 160px); }
        .item-wrapper { position: relative; margin-bottom: 10px; background: #333; border-radius: 12px; overflow: hidden; }
        .item-main { background: var(--card); padding: 22px 20px; position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid transparent; }
        
        .status-on_test { border-left-color: var(--on-test); }
        .status-already { border-left-color: var(--already); }
        .status-future { border-left-color: var(--future); }

        /* EDITOR SPLIT */
        #note-editor { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; flex-direction:column; }
        .editor-split { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .text-zone { flex: 1.2; display: flex; flex-direction: column; border-bottom: 2px solid #333; position: relative; }
        .video-zone { flex: 0.8; background: #000; padding: 10px; position: relative; }

        .tabs { display: flex; gap: 5px; padding: 10px; background: #111; }
        .tab { flex: 1; padding: 12px 2px; border-radius: 6px; font-size: 10px; font-weight: bold; text-align: center; opacity: 0.4; color: #000; }
        .tab.active { opacity: 1; border: 1px solid white; }
        
        #note-display { position: absolute; top:0; left:0; width:100%; height:100%; padding:15px; color:white; font-size:16px; pointer-events:none; white-space:pre-wrap; z-index:1; }
        #note-textarea { width:100%; height:100%; background:transparent; border:none; color:transparent; caret-color:white; padding:15px; font-size:16px; resize:none; outline:none; -webkit-user-select:text; user-select:text; z-index:2; position:relative; }

        /* VIDEO */
        .video-placeholder { border: 2px dashed #444; border-radius: 12px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; }
        iframe { width: 100%; height: 100%; border-radius: 10px; border: none; }
        .wiki-link { color: var(--turquoise); text-decoration: underline; pointer-events: auto; font-weight: bold; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:4000; justify-content:center; align-items:center; }
        .modal-content { background:var(--card); padding:20px; border-radius:15px; width:90%; border: 1px solid var(--turquoise); }
    </style>
</head>
<body>

<div id="main-view">
    <div class="header">
        <div class="nav-top">
            <button id="btn-back" class="back-btn" onclick="goBack()" style="visibility: hidden;">〈 Retour</button>
            <span id="path-display" style="font-size:10px; color:var(--turquoise);">ACCUEIL</span>
        </div>
        <h2 id="view-title" style="margin:0;">JJB Vault</h2>
    </div>
    <div id="app-content" class="container"></div>
    <nav style="position:fixed; bottom:0; width:100%; height:75px; background:var(--card); display:flex; justify-content:center; align-items:center; border-top:1px solid #333; z-index:100;">
        <button onclick="goHome()" style="background:none; border:none; font-size:32px;">🏠</button>
    </nav>
</div>

<div id="note-editor">
    <div class="header" style="padding:10px 20px;">
        <button onclick="closeEditor()" class="back-btn">〈 Fermer</button>
        <h4 id="editor-title" style="margin:0;">Note</h4>
    </div>
    <div class="editor-split">
        <div class="text-zone">
            <div class="tabs">
                <div class="tab" id="tab-on_test" style="background:var(--on-test)" onclick="switchTab('on_test')">ON TEST</div>
                <div class="tab" id="tab-already" style="background:var(--already)" onclick="switchTab('already')">ALREADY</div>
                <div class="tab" id="tab-future" style="background:var(--future)" onclick="switchTab('future')">FUTURE</div>
            </div>
            <div style="flex:1; position:relative;" id="wiki-click-layer">
                <div id="note-display"></div>
                <textarea id="note-textarea" spellcheck="false" oninput="handleInput()" onscroll="syncScroll()"></textarea>
            </div>
        </div>
        <div class="video-zone" id="video-area"></div>
    </div>
</div>

<div id="video-modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--turquoise); margin-top:0;">Importer Vidéo</h3>
        <input type="text" id="vid-url" class="search-input" placeholder="Lien (YouTube, TikTok, Insta...)" style="width:100%; margin-bottom:10px;">
        <div id="time-wrap" style="display:none">
            <input type="text" id="vid-time" class="search-input" placeholder="Timecode (ex: 1:20)" style="width:100%; margin-bottom:15px;">
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="closeVideoModal()" style="flex:1; padding:12px; background:#333; color:#fff; border-radius:8px; border:none;">Annuler</button>
            <button onclick="confirmVideo()" style="flex:1; padding:12px; background:var(--turquoise); color:#000; border-radius:8px; border:none; font-weight:bold;">Importer</button>
        </div>
    </div>
</div>

<script>
    const initialData = {
        journalier: [],
        data: { 
            order: ["Grappling", "Wrestling"], 
            children: { 
                "Grappling": { type: "folder", order: ["Top", "Bottom"], children: {
                    "Top": { type: "folder", order: ["Pin"], children: {
                        "Pin": { type: "folder", order: ["Mount"], children: { 
                            "Mount": {type:"folder", order:["Underhook Control"], children:{
                                "Underhook Control": {
                                    type: "tech", status: "on_test", notes: { on_test: "essayez de grimper avec votre main comme une araignée pour passer en chest wrap", already: "prendre le poignet et le plaquer au sol", future: "" }, videos: {}
                                }
                            }}
                        }}
                    }},
                    "Bottom": { type: "folder", order: [], children: {} }
                }},
                "Wrestling": { type: "folder", order: ["Underhook"], children: {
                    "Underhook": { type: "folder", order: ["Attack"], children: { "Attack":{type:"folder", children:{}, order:[]} } }
                }}
            } 
        }
    };

    let db = JSON.parse(localStorage.getItem('jjb_vault_v19')) || initialData;
    let currentPath = [];
    let activeTech = null;
    let currentTab = 'on_test';
    let searchQuery = "";
    let techMap = {};

    function saveDB() { localStorage.setItem('jjb_vault_v19', JSON.stringify(db)); buildTechMap(); render(); }
    function goHome() { currentPath = []; searchQuery = ""; render(); }
    function goBack() { currentPath.pop(); if(currentPath[currentPath.length-1]==='children') currentPath.pop(); render(); }

    function buildTechMap() {
        techMap = {};
        function scan(obj, path) {
            if(obj.children) {
                Object.keys(obj.children).forEach(key => {
                    techMap[key.toLowerCase()] = { name: key, path: [...path] };
                    scan(obj.children[key], [...path, key, 'children']);
                });
            }
        }
        scan(db.data, ['data', 'children']);
    }

    function render() {
        const content = document.getElementById('app-content');
        content.innerHTML = "";
        const isHome = currentPath.length === 0;

        document.getElementById('btn-back').style.visibility = isHome ? "hidden" : "visible";
        document.getElementById('path-display').innerText = isHome ? "ACCUEIL" : currentPath.filter(p => p !== "children").join(" > ").toUpperCase();

        if (!isHome && currentPath[0] !== 'journalier') {
            const searchDiv = document.createElement('div');
            searchDiv.className = "search-bar-wrap";
            searchDiv.innerHTML = `<input type="text" id="search-input" class="search-input" placeholder="Rechercher..." value="${searchQuery}" onkeydown="if(event.key==='Enter') execSearch()"><button class="search-go" onclick="execSearch()">OK</button>`;
            content.appendChild(searchDiv);
        }

        if (searchQuery) { renderSearchResults(content); return; }

        if (isHome) {
            renderItem(content, "Journalier", () => {currentPath=['journalier'];render();});
            renderItem(content, "Data", () => {currentPath=['data'];render();});
            return;
        }

        let current = db; currentPath.forEach(p => current = current[p]);
        document.getElementById('view-title').innerText = currentPath[currentPath.length-1];

        if(current && current.order) {
            current.order.forEach(key => {
                const item = current.children[key];
                renderItem(content, key, () => {
                    if(item.type === 'folder') { currentPath.push('children', key); render(); }
                    else { openEditor(key, currentPath); }
                }, item.status);
            });
        }
    }

    function renderItem(parent, label, onclick, status) {
        const wrap = document.createElement('div');
        wrap.className = `item-wrapper ${status ? 'status-'+status : ''}`;
        wrap.innerHTML = `<div class="item-main"><strong>${label}</strong><span>〉</span></div>`;
        wrap.onclick = onclick;
        parent.appendChild(wrap);
    }

    function execSearch() {
        searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
        render();
    }

    function renderSearchResults(container) {
        const results = [];
        function scan(obj, path) {
            if(obj.children) {
                Object.keys(obj.children).forEach(key => {
                    const item = obj.children[key];
                    if(key.toLowerCase().includes(searchQuery) || (item.notes && Object.values(item.notes).some(n => n.toLowerCase().includes(searchQuery)))) {
                        results.push({name: key, path: [...path], item: item});
                    }
                    scan(item, [...path, key, 'children']);
                });
            }
        }
        scan(db.data, ['data', 'children']);
        results.forEach(res => {
            renderItem(container, res.name, () => {
                searchQuery = "";
                if(res.item.type === 'folder') { currentPath = [...res.path, res.name]; render(); }
                else { openEditor(res.name, res.path); }
            }, res.item.status);
        });
    }

    // --- EDITOR ---
    function openEditor(key, path) {
        let parent = db; path.forEach(p => parent = parent[p]);
        activeTech = parent.children[key];
        document.getElementById('editor-title').innerText = key;
        document.getElementById('note-editor').style.display = 'flex';
        switchTab(activeTech.status || 'on_test');
    }

    function switchTab(status) {
        currentTab = status;
        activeTech.status = status;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + status).classList.add('active');
        const text = (activeTech.notes && activeTech.notes[status]) ? activeTech.notes[status] : "";
        document.getElementById('note-textarea').value = text;
        updateWiki(text);
        renderVideoArea();
    }

    function renderVideoArea() {
        const area = document.getElementById('video-area');
        const video = (activeTech.videos && activeTech.videos[currentTab]) ? activeTech.videos[currentTab] : null;

        if(!video) {
            area.innerHTML = `<div class="video-placeholder" onclick="openVideoModal()"><span>➕</span><p>Ajouter une vidéo (${currentTab})</p></div>`;
        } else {
            let content = "";
            if(video.url.includes("youtube.com") || video.url.includes("youtu.be")) {
                const id = extractYT(video.url);
                content = `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
            } else {
                content = `<div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#111; border-radius:10px; border:1px solid var(--turquoise);">
                            <button onclick="window.open('${video.url}')" style="background:var(--turquoise); border:none; padding:12px 20px; border-radius:20px; font-weight:bold;">Ouvrir Vidéo (Insta/TikTok)</button>
                           </div>`;
            }
            area.innerHTML = content + (video.time ? `<div style="color:var(--turquoise); font-size:12px; text-align:center; margin-top:5px;">⏱ ${video.time}</div>` : "");
            
            // Swipe Delete
            let sX = 0;
            area.ontouchstart = e => sX = e.touches[0].clientX;
            area.ontouchend = e => {
                if(sX - e.changedTouches[0].clientX > 80) {
                    if(confirm("Supprimer la vidéo de cet onglet ?")) {
                        delete activeTech.videos[currentTab];
                        saveDB(); renderVideoArea();
                    }
                }
            };
        }
    }

    function openVideoModal() { 
        document.getElementById('video-modal').style.display = 'flex';
        document.getElementById('vid-url').oninput = (e) => {
            const isYT = e.target.value.includes("youtube.com") || e.target.value.includes("youtu.be");
            document.getElementById('time-wrap').style.display = isYT ? 'block' : 'none';
        };
    }
    function closeVideoModal() { document.getElementById('video-modal').style.display = 'none'; }
    function confirmVideo() {
        const url = document.getElementById('vid-url').value;
        const time = document.getElementById('vid-time').value;
        if(url) {
            if(!activeTech.videos) activeTech.videos = {};
            activeTech.videos[currentTab] = { url, time };
            saveDB(); renderVideoArea();
        }
        closeVideoModal();
    }

    function handleInput() {
        if(!activeTech.notes) activeTech.notes = {};
        activeTech.notes[currentTab] = document.getElementById('note-textarea').value;
        updateWiki(activeTech.notes[currentTab]);
        localStorage.setItem('jjb_vault_v19', JSON.stringify(db));
    }

    function updateWiki(text) {
        const display = document.getElementById('note-display');
        let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const keys = Object.keys(techMap).sort((a,b) => b.length - a.length);
        if(keys.length > 0) {
            const regex = new RegExp(`\\b(${keys.join('|')})\\b`, 'gi');
            html = html.replace(regex, (m) => `<span class="wiki-link">${m}</span>`);
        }
        display.innerHTML = html + "\n";
    }

    document.getElementById('wiki-click-layer').onclick = (e) => {
        if(e.target.classList.contains('wiki-link')) {
            const name = e.target.innerText.toLowerCase();
            const target = techMap[name];
            if(target) {
                let parent = db; target.path.forEach(p => parent = parent[p]);
                if(parent.children[target.name].type === 'tech') openEditor(target.name, target.path);
                else { closeEditor(); currentPath = [...target.path, target.name]; render(); }
            }
        }
    };

    function extractYT(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const m = url.match(reg); return (m&&m[2].length==11)?m[2]:"";
    }
    function syncScroll() { document.getElementById('note-display').scrollTop = document.getElementById('note-textarea').scrollTop; }
    function closeEditor() { document.getElementById('note-editor').style.display = 'none'; render(); }

    buildTechMap();
    render();
</script>
</body>
</html>
