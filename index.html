<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJB Vault V28 - FULL SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg: #000; --card: #1c1c1e; --text: #fff; --turquoise: #00f2ff; 
            --danger: #ff453a; --edit: #5e5ce6; --accent: #0a84ff;
            --on-test: #30d158; --already: #ff9f0a; --future: #00f2ff;
        }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; }
        
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid #333; position: sticky; top:0; z-index: 100; }
        .version-tag { position: absolute; top: 5px; left: 10px; font-size: 8px; color: var(--turquoise); font-weight: bold; }
        .nav-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; height: 30px; }
        .back-btn { color: var(--turquoise); font-weight: bold; font-size: 16px; background: none; border: none; padding: 0; cursor: pointer; }
        
        .container { padding: 15px; }
        .search-bar-wrap { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-input { flex: 1; background: #2c2c2e; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; -webkit-user-select: text; user-select: text; outline: none; }
        .search-go { background: var(--turquoise); border: none; border-radius: 10px; padding: 0 15px; font-weight: bold; color: #000; }
        .btn-add { background: var(--turquoise); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-bottom: 20px; }
        
        /* ITEMS */
        .item-wrapper { position: relative; margin-bottom: 12px; background: #333; border-radius: 12px; overflow: hidden; touch-action: pan-y; }
        .item-main { background: var(--card); padding: 22px 20px; position: relative; z-index: 10; display: flex; flex-direction: column; transition: transform 0.3s ease; cursor: pointer; }
        .item-actions { position: absolute; right: 0; top: 0; height: 100%; display: flex; z-index: 1; }
        .action-btn { width: 65px; border: none; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .swiped .item-main { transform: translateX(-195px); }

        /* SPLIT SCREEN EDITOR */
        #note-editor { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; flex-direction:column; }
        .editor-split { display: flex; flex-direction: column; height: 100%; }
        .tabs { display: flex; gap: 8px; padding: 12px; background: #111; }
        .tab { flex: 1; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: bold; text-align: center; opacity: 0.3; color: #000; }
        .tab.active { opacity: 1; border: 2px solid white; }
        
        .text-zone { flex: 1; position: relative; border-bottom: 2px solid #333; }
        #note-display { position: absolute; top:0; left:0; width:100%; height:100%; padding:15px; color:white; font-size:16px; white-space:pre-wrap; pointer-events:none; z-index:1; overflow-y:auto; }
        #note-textarea { width:100%; height:100%; background:transparent; border:none; color:transparent; caret-color:white; padding:15px; font-size:16px; resize:none; outline:none; -webkit-user-select:text; user-select:text; z-index:2; position:relative; }
        
        .video-zone { flex: 1; background: #000; overflow-y: auto; padding: 10px; }
        .vid-card { background: #1c1c1e; border-radius: 12px; margin-bottom: 15px; overflow: hidden; border: 1px solid #333; }
        .vid-card iframe { width: 100%; height: 180px; border: none; }
        .vid-ctrl { padding: 8px; display: flex; justify-content: space-between; align-items: center; }

        /* MODALS */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:3000; justify-content:center; align-items:center; }
        .modal-content { background:var(--card); padding:20px; border-radius:15px; width:85%; border: 1px solid var(--turquoise); }
        
        nav { position:fixed; bottom:0; width:100%; height:75px; background:var(--card); display:flex; justify-content:center; align-items:center; border-top:1px solid #333; z-index:100; }
    </style>
</head>
<body>

<div id="main-view">
    <div class="header">
        <div class="version-tag">V28.0.0</div>
        <div class="nav-top">
            <button id="btn-back" class="back-btn" onclick="goBack()" style="visibility: hidden;">〈 Retour</button>
            <span id="path-display" style="font-size:10px; color:var(--turquoise);">ACCUEIL</span>
        </div>
        <h2 id="view-title" style="margin:0;">JJB Vault</h2>
    </div>
    <div id="app-content" class="container"></div>
    <nav><button onclick="goHome()" style="background:none; border:none; font-size:32px;">🏠</button></nav>
</div>

<div id="note-editor">
    <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="closeEditor()" class="back-btn">〈 Retour</button>
        <h3 id="editor-title" style="margin:0; font-size:14px;">Edit</h3>
        <div style="width:50px;"></div>
    </div>
    <div class="editor-split">
        <div class="tabs">
            <div class="tab" id="tab-on_test" style="background:var(--on-test)" onclick="switchTab('on_test')">ON TEST</div>
            <div class="tab" id="tab-already" style="background:var(--already)" onclick="switchTab('already')">ALREADY</div>
            <div class="tab" id="tab-future" style="background:var(--future)" onclick="switchTab('future')">FUTURE</div>
        </div>
        <div class="text-zone">
            <div id="note-display"></div>
            <textarea id="note-textarea" oninput="handleInput()" onscroll="syncScroll()"></textarea>
        </div>
        <div class="video-zone" id="video-list"></div>
    </div>
</div>

<div id="item-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title">Nouveau</h3>
        <input type="text" id="item-input" class="search-input" style="width:100%; margin-bottom:15px;">
        <div id="tech-check-wrap" style="margin-bottom:15px;">
            <label><input type="checkbox" id="is-tech"> Fenêtre Finale</label>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal('item-modal')" style="flex:1; padding:12px; background:#444; border:none; border-radius:8px; color:white;">Annuler</button>
            <button id="modal-confirm" style="flex:1; padding:12px; background:var(--turquoise); border:none; border-radius:8px; font-weight:bold;">Valider</button>
        </div>
    </div>
</div>

<div id="video-modal" class="modal">
    <div class="modal-content">
        <h3>Ajouter Vidéo</h3>
        <button onclick="prepVid('yt')" style="width:100%; padding:12px; margin-bottom:10px; background:#333; color:white; border:none; border-radius:8px;">YouTube (avec Timecode)</button>
        <button onclick="prepVid('short')" style="width:100%; padding:12px; background:#333; color:white; border:none; border-radius:8px;">Short / Insta / Autre</button>
        <div id="vid-inputs" style="display:none; margin-top:15px;">
            <input type="text" id="vid-url" class="search-input" style="width:100%; margin-bottom:10px;" placeholder="Lien URL">
            <div id="tc-wrap" style="display:none; flex-gap:5px; margin-bottom:10px;">
                <input type="number" id="tc-m" style="width:45%; padding:10px;" placeholder="Min">
                <input type="number" id="tc-s" style="width:45%; padding:10px;" placeholder="Sec">
            </div>
            <button onclick="confirmVid()" style="width:100%; padding:12px; background:var(--turquoise); border:none; border-radius:8px; font-weight:bold;">Ajouter</button>
        </div>
    </div>
</div>

<script>
    // STRUCTURE INITIALE JJB
    const initialTree = {
        "Top": { type:"folder", order:["Pin", "Passing"], children: {
            "Pin": { type:"folder", order:["Mount", "Side Control", "Ride"], children: {
                "Mount":{type:"folder", order:[], children:{}}, "Side Control":{type:"folder", order:[], children:{}}, "Ride":{type:"folder", order:[], children:{}}
            }},
            "Passing": { type:"folder", order:["Half Guard Pass", "Outside Pass"], children: {
                "Half Guard Pass": { type:"folder", order:["Chest-to-Chest", "Half Guard", "Knee Shield Half Guard"], children:{
                    "Chest-to-Chest":{type:"folder", order:[], children:{}}, "Half Guard":{type:"folder", order:[], children:{}},
                    "Knee Shield Half Guard": { type:"folder", order:["High Knee Shield", "Medium Knee Shield", "Low Knee Shield"], children:{
                        "Medium Knee Shield": { type:"folder", order:["Knee Elbow Open", "Knee Elbow Close"], children:{
                            "Knee Elbow Open":{type:"folder", order:[], children:{}}, "Knee Elbow Close":{type:"folder", order:[], children:{}}
                        }}
                    }}
                }}
            }}
        }},
        "Bottom": { type:"folder", order:["Closed Guard", "Half Guard", "Open Seated", "Open Supine", "Pin Escape"], children: {
            "Pin Escape": { type:"folder", order:["Side Control Escape", "Mount Escape", "Back Escape", "Ride Escape", "Turtle Escape", "Dogfight"], children:{} }
        }},
        "Wrestling": { type:"folder", order:["Underhook", "2-on-1", "Collar Tie", "Single Leg", "Double Leg"], children: {
            "Underhook": { type:"folder", order:["Underhook Attack", "Underhook Defense"], children: {
                "Underhook Attack": { type:"tech", status:"on_test", notes:{on_test:"",already:"",future:""}, videos:{on_test:[],already:[],future:[]} }
            }}
        }}
    };

    let db = JSON.parse(localStorage.getItem('jjb_v28')) || { journalier: [], data: { order: ["Top", "Bottom", "Wrestling"], children: initialTree } };
    let currentPath = [];
    let activeTech = null;
    let searchQuery = "";
    let vidType = 'yt';

    function save() { localStorage.setItem('jjb_v28', JSON.stringify(db)); render(); }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    function goHome() { currentPath = []; searchQuery=""; render(); }
    function goBack() { currentPath.pop(); if(currentPath[currentPath.length-1]==='children') currentPath.pop(); render(); }

    function render() {
        const content = document.getElementById('app-content');
        content.innerHTML = "";
        const isHome = currentPath.length === 0;
        const isJournalier = currentPath[0] === 'journalier';
        
        document.getElementById('btn-back').style.visibility = isHome ? "hidden" : "visible";
        document.getElementById('path-display').innerText = isHome ? "ACCUEIL" : currentPath.filter(p=>p!=='children').join(" > ").toUpperCase();

        if(isHome) {
            content.innerHTML = `
                <div class="item-wrapper"><div class="item-main" onclick="currentPath=['journalier'];render()"><strong>Journalier</strong></div></div>
                <div class="item-wrapper"><div class="item-main" onclick="currentPath=['data'];render()"><strong>Data</strong></div></div>`;
            return;
        }

        if(!isJournalier) {
            content.innerHTML += `
                <div class="search-bar-wrap">
                    <input type="text" id="search-input" class="search-input" placeholder="Recherche..." value="${searchQuery}">
                    <button class="search-go" onclick="doSearch()">OK</button>
                </div>
                ${!searchQuery ? '<button class="btn-add" onclick="openAdd()">+ AJOUTER FENÊTRE</button>' : ''}`;
        }

        if(searchQuery) { renderSearch(content); return; }

        let cur = db; currentPath.forEach(p => cur = cur[p]);
        const list = document.createElement('div');
        list.id = "sortable-list";
        content.appendChild(list);

        const items = isJournalier ? db.journalier : (cur.order || []);
        items.forEach(obj => {
            const key = isJournalier ? obj.name : obj;
            const path = isJournalier ? obj.path : currentPath;
            let target = db; path.forEach(p => target = target[p]);
            const item = target.children[key];
            if(!item) return;

            const wrap = createUI(key, () => {
                if(item.type === 'folder') { currentPath = [...path, 'children', key]; render(); }
                else { openEditor(key, path); }
            }, item.status, path);
            list.appendChild(wrap);
        });

        new Sortable(list, { 
            animation: 150, 
            onEnd: () => {
                const newOrder = Array.from(list.querySelectorAll('.item-title')).map(el => el.innerText);
                if(isJournalier) {
                    const mapped = newOrder.map(n => db.journalier.find(f => f.name === n));
                    db.journalier = mapped;
                } else {
                    cur.order = newOrder;
                }
                localStorage.setItem('jjb_v28', JSON.stringify(db));
            }
        });
    }

    function createUI(label, onclick, status, path) {
        const wrap = document.createElement('div');
        const isFav = db.journalier.some(f => f.name === label);
        wrap.className = `item-wrapper ${status?'status-'+status:''}`;
        wrap.innerHTML = `
            <div class="item-actions">
                <button class="action-btn" style="background:${isFav?'var(--danger)':'var(--accent)'}" onclick="toggleFav('${label}', ${JSON.stringify(path)})">${isFav?'🚫':'⭐'}</button>
                <button class="action-btn" style="background:var(--edit)" onclick="openRename('${label}', ${JSON.stringify(path)})">✏️</button>
                <button class="action-btn" style="background:var(--danger)" onclick="delItem('${label}', ${JSON.stringify(path)})">🗑️</button>
            </div>
            <div class="item-main">
                <strong class="item-title">${label}</strong>
            </div>`;
        wrap.querySelector('.item-main').onclick = onclick;
        let startX;
        wrap.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        wrap.addEventListener('touchend', e => {
            let diff = startX - e.changedTouches[0].clientX;
            if(diff > 60) wrap.classList.add('swiped');
            else if(diff < -60) wrap.classList.remove('swiped');
        });
        return wrap;
    }

    // GESTION RECHERCHE
    function doSearch() { searchQuery = document.getElementById('search-input').value.toLowerCase(); render(); }
    function renderSearch(container) {
        function scan(obj, path) {
            Object.keys(obj.children || {}).forEach(k => {
                const it = obj.children[k];
                if(k.toLowerCase().includes(searchQuery)) {
                    container.appendChild(createUI(k, () => {
                        searchQuery = ""; 
                        if(it.type==='folder'){ currentPath = [...path, k, 'children']; }
                        else { openEditor(k, path); }
                        render();
                    }, it.status, path));
                }
                scan(it, [...path, k, 'children']);
            });
        }
        scan(db.data, ['data', 'children']);
    }

    // MODALS & ACTIONS
    function openAdd() {
        document.getElementById('modal-title').innerText = "Ajouter";
        document.getElementById('tech-check-wrap').style.display = "block";
        document.getElementById('item-input').value = "";
        document.getElementById('item-modal').style.display = "flex";
        document.getElementById('modal-confirm').onclick = () => {
            const name = document.getElementById('item-input').value.trim();
            if(!name) return;
            let cur = db; currentPath.forEach(p => cur = cur[p]);
            cur.children[name] = document.getElementById('is-tech').checked ? 
                { type:"tech", status:"on_test", notes:{on_test:"",already:"",future:""}, videos:{on_test:[],already:[],future:[]} } : 
                { type:"folder", order:[], children:{} };
            cur.order.push(name);
            save(); closeModal('item-modal');
        };
    }

    function openRename(oldName, path) {
        document.getElementById('modal-title').innerText = "Renommer";
        document.getElementById('tech-check-wrap').style.display = "none";
        document.getElementById('item-input').value = oldName;
        document.getElementById('item-modal').style.display = "flex";
        document.getElementById('modal-confirm').onclick = () => {
            const newName = document.getElementById('item-input').value.trim();
            if(!newName || newName === oldName) return;
            let target = db; path.forEach(p => target = target[p]);
            target.children[newName] = target.children[oldName];
            delete target.children[oldName];
            target.order = target.order.map(n => n === oldName ? newName : n);
            db.journalier.forEach(f => { if(f.name === oldName) f.name = newName; });
            save(); closeModal('item-modal');
        };
    }

    function delItem(name, path) {
        if(confirm("Supprimer ?")) {
            let target = db; path.forEach(p => target = target[p]);
            delete target.children[name];
            target.order = target.order.filter(n => n !== name);
            db.journalier = db.journalier.filter(f => f.name !== name);
            save();
        }
    }

    function toggleFav(name, path) {
        const idx = db.journalier.findIndex(f => f.name === name);
        if(idx > -1) db.journalier.splice(idx, 1);
        else db.journalier.push({name, path});
        save();
    }

    // EDITOR SPLIT SCREEN
    function openEditor(key, path) {
        let t = db; path.forEach(p => t = t[p]);
        activeTech = t.children[key];
        document.getElementById('editor-title').innerText = key;
        document.getElementById('note-editor').style.display = 'flex';
        switchTab(activeTech.status || 'on_test');
    }

    function switchTab(s) {
        activeTech.status = s;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+s).classList.add('active');
        document.getElementById('note-textarea').value = activeTech.notes[s] || "";
        document.getElementById('note-display').innerText = activeTech.notes[s] || "";
        renderVids();
    }

    function renderVids() {
        const container = document.getElementById('video-list');
        container.innerHTML = `<button onclick="document.getElementById('video-modal').style.display='flex'" style="width:100%; padding:15px; background:#111; border:1px dashed #444; color:#888; border-radius:10px; font-weight:bold; margin-bottom:15px;">➕ AJOUTER VIDÉO</button>`;
        const list = activeTech.videos[activeTech.status] || [];
        list.forEach((v, i) => {
            const div = document.createElement('div');
            div.className = "vid-card";
            div.innerHTML = `
                <iframe src="${v.url}" allowfullscreen></iframe>
                <div class="vid-ctrl">
                    <span style="font-size:10px; color:#666;">${v.type}</span>
                    <button onclick="delVid(${i})" style="background:var(--danger); border:none; color:white; padding:5px 10px; border-radius:5px; font-size:11px;">MOINS (-)</button>
                </div>`;
            container.appendChild(div);
        });
    }

    function prepVid(type) {
        vidType = type;
        document.getElementById('vid-inputs').style.display = "block";
        document.getElementById('tc-wrap').style.display = type === 'yt' ? "flex" : "none";
    }

    function confirmVid() {
        const urlInput = document.getElementById('vid-url').value;
        if(!urlInput) return;
        let finalUrl = "";
        if(vidType === 'yt') {
            const id = urlInput.includes('v=') ? urlInput.split('v=')[1].split('&')[0] : urlInput.split('be/')[1].split('?')[0];
            const sec = (parseInt(document.getElementById('tc-m').value || 0)*60) + parseInt(document.getElementById('tc-s').value || 0);
            finalUrl = `https://www.youtube.com/embed/${id}?start=${sec}`;
        } else {
            if(urlInput.includes('shorts/')) {
                const id = urlInput.split('shorts/')[1].split('?')[0];
                finalUrl = `https://www.youtube.com/embed/${id}`;
            } else { finalUrl = urlInput; }
        }
        activeTech.videos[activeTech.status].push({ url: finalUrl, type: vidType });
        document.getElementById('vid-inputs').style.display="none";
        document.getElementById('video-modal').style.display="none";
        save(); renderVids();
    }

    function delVid(i) {
        if(confirm("Supprimer la vidéo ?")) {
            activeTech.videos[activeTech.status].splice(i, 1);
            save(); renderVids();
        }
    }

    function handleInput() {
        activeTech.notes[activeTech.status] = document.getElementById('note-textarea').value;
        document.getElementById('note-display').innerText = activeTech.notes[activeTech.status];
        localStorage.setItem('jjb_v28', JSON.stringify(db));
    }
    function syncScroll() { document.getElementById('note-display').scrollTop = document.getElementById('note-textarea').scrollTop; }
    function closeEditor() { document.getElementById('note-editor').style.display='none'; render(); }

    render();
</script>
</body>
</html>
